<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вход по коду · viaVuca</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 34%),
                radial-gradient(circle at bottom right, rgba(125, 158, 190, 0.24), transparent 38%),
                linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            color: #1e2b3c;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .enter-card {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            box-shadow: 0 24px 55px -22px rgba(18, 40, 60, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 2rem;
            text-align: center;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.05) forwards;
            opacity: 0;
            transform: translateY(18px);
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: block;
            width: auto;
            height: clamp(56px, 10vw, 82px);
            margin: 0 auto 0.75rem;
            object-fit: contain;
        }

        .sub {
            color: #5a6e7c;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.35;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid #d9e5ee;
            border-left: 4px solid #e67e22;
            border-radius: 1.15rem;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
            letter-spacing: 1px;
            color: #1a3b4f;
            font-weight: 400;
            outline: none;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #9aaab7;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        input:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            border-left-color: #e67e22;
        }

        input:focus {
            background: #ffffff;
            border-color: #9fb7c8;
            border-left-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.16);
        }

        button {
            width: auto;
            min-width: 190px;
            background: #2c7a47;
            border: none;
            padding: 0.75rem 1.55rem;
            border-radius: 999px;
            font-weight: 800;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.65);
        }

        button:hover:not(:disabled) {
            background: #1f5f36;
            transform: scale(0.98);
            box-shadow: 0 14px 26px -18px rgba(18, 40, 60, 0.8);
        }

        button:disabled {
            background: #8da899;
            cursor: not-allowed;
            opacity: 0.75;
            transform: none;
        }

        .error {
            color: #d92d20;
            margin-top: 0.75rem;
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.35;
            min-height: 1.2rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #5a6e7c;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 800;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #1e4663;
            text-decoration: underline;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 0.8rem;
            }

            .enter-card {
                padding: 1.65rem 1.2rem;
                border-radius: 1.7rem;
            }

            .logo {
                height: clamp(52px, 14vw, 76px);
            }

            .sub {
                font-size: 0.9rem;
                margin-bottom: 1.25rem;
            }

            input {
                font-size: 0.95rem;
                padding: 0.75rem 0.9rem;
            }

            button {
                min-width: 180px;
                padding: 0.7rem 1.35rem;
                font-size: 0.9rem;
            }
        }
    </style>

    <script src="js/cloud.js"></script>
</head>

<body>
<div class="enter-card">
    <img src="logo/logo.svg" alt="viaVuca" class="logo">

    <div class="sub">Введите код теста, который дал организатор</div>

    <input type="text" id="testCode" placeholder="например: a1b2c3d4" autocomplete="off">

    <button id="enterBtn">Перейти к тесту</button>

    <div id="errorMsg" class="error"></div>

    <a href="welcome.html" class="back-link">← На главную</a>
</div>

<script>
    const enterBtn = document.getElementById('enterBtn');
    const testCodeInput = document.getElementById('testCode');
    const errorMsg = document.getElementById('errorMsg');

    async function checkTestIdExists(testId) {
        try {
            await loadTestConfig(testId);
            return true;
        } catch (e) {
            console.error('Тест не найден:', e);
            return false;
        }
    }

    enterBtn.addEventListener('click', async () => {
        let code = testCodeInput.value.trim();

        if (!code) {
            errorMsg.innerText = 'Введите код теста';
            return;
        }

        let testId = code;

        if (!code.startsWith('test_')) {
            testId = 'test_' + code;
        }

        errorMsg.innerText = '';
        enterBtn.disabled = true;
        enterBtn.innerHTML = '<span class="loader"></span> Проверка...';

        const exists = await checkTestIdExists(testId);

        if (exists) {
            window.location.href = `test_auth.html?testId=${encodeURIComponent(testId)}`;
        } else {
            errorMsg.innerText = `Тест с кодом "${testId}" не найден. Проверьте правильность ввода.`;
            enterBtn.disabled = false;
            enterBtn.innerText = 'Перейти к тесту';
        }
    });

    testCodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enterBtn.click();
    });
</script>
</body>
</html>
