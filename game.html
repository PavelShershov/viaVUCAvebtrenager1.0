<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="pageTitle">Тактический тренажёр</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
                radial-gradient(circle at bottom right, rgba(125, 158, 190, 0.22), transparent 38%),
                linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.5rem;
            color: #1e2b3c;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            position: relative;
        }

        .particle {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(100, 120, 150, 0.16);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 1;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(105vh) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 0.45;
            }

            80% {
                opacity: 0.45;
            }

            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .game-card {
            display: flex;
            flex-direction: column;
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 2.35rem;
            box-shadow: 0 24px 55px -22px rgba(18, 40, 60, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 1.2rem;
            margin: 0;
            position: relative;
            z-index: 10;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.05) forwards;
            opacity: 0;
            transform: translateY(18px);
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: #1a3b4f;
            border: 1px solid #cbdbe2;
            transition: 0.2s;
            z-index: 100;
            box-shadow: 0 8px 18px -16px rgba(18, 40, 60, 0.5);
        }

        .back-button:hover {
            background: white;
            transform: translateX(-2px);
            border-color: #9fb7c8;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.65);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 1.9rem);
            font-weight: 800;
            letter-spacing: -0.045em;
            background: linear-gradient(135deg, #172637, #2a4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.2rem;
            line-height: 1.05;
        }

        .sub {
            text-align: center;
            color: #5a6e7c;
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #dce5ef;
            padding-bottom: 0.3rem;
        }

        .task-select {
            background:
                rgba(255, 255, 255, 0.86)
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%234b6a8b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
            padding: 0.6rem 2rem 0.6rem 1rem;
            border-radius: 999px;
            font-weight: 800;
            font-size: clamp(0.85rem, 3vw, 1rem);
            color: #1a3b4f;
            text-align: center;
            margin-bottom: 0.8rem;
            border: 1px solid #d9e5ee;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
        }

        @media (min-width: 700px) {
            .task-select {
                width: 70%;
                margin-left: auto;
                margin-right: auto;
            }
        }

        .task-select:hover {
            background-color: #ffffff;
            border-color: #9fb7c8;
        }

        .task-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.16);
        }

        .question {
            padding: 0 0.9rem;
            margin-left: -1.2rem;
            margin-right: -1.2rem;
            font-weight: 800;
            font-size: clamp(1.15rem, 4vw, 1.35rem);
            color: #1a3b4f;
            text-align: center;
            margin-bottom: 0.01rem;
            line-height: 1.35;
        }

        .board-wrapper {
            position: relative;
            background: transparent;
            border-radius: 1.2rem;
            padding: 0.4rem;
            box-shadow: none;
            margin-bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: visible;
        }

        #boardCanvas {
            display: block;
            max-width: 100%;
            max-height: 53vh;
            width: auto;
            height: auto;
            border-radius: 1rem;
            background: transparent;
            border: 1px solid rgba(203, 219, 226, 0.68);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.9),
                0 12px 26px -18px rgba(18, 40, 60, 0.52);
            cursor: pointer;
            transition: transform 0.22s ease, opacity 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
            transform: none;
            transform-origin: center top;
            will-change: transform;
        }

        .board-wrapper.show-result #boardCanvas {
            transform: scale(0.9);
            transform-origin: center top;
        }

        #boardCanvas.correct {
            border-color: rgba(21, 181, 108, 0.95);
            box-shadow:
                0 0 0 4px rgba(21, 181, 108, 0.22),
                0 0 0 1px rgba(21, 181, 108, 0.8),
                0 18px 36px -22px rgba(21, 181, 108, 0.8);
        }

        #boardCanvas.wrong {
            border-color: rgba(239, 83, 80, 0.95);
            box-shadow:
                0 0 0 4px rgba(239, 83, 80, 0.2),
                0 0 0 1px rgba(239, 83, 80, 0.82),
                0 18px 36px -22px rgba(239, 83, 80, 0.78);
        }

        .result {
            position: absolute;
            left: 50%;
            bottom: 0.35rem;
            transform: translateX(-50%);
            width: calc(100% - 0.8rem);
            max-width: 560px;
            border-radius: 1rem;
            background: rgba(255, 246, 228, 0.96);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 12px 28px -18px rgba(18, 40, 60, 0.7);
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
            z-index: 4;
            text-align: center;
        }

        .result.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result.correct {
            background: rgba(227, 255, 241, 0.96);
            color: #067647;
            border-color: rgba(21, 181, 108, 0.38);
        }

        .result.wrong {
            background: rgba(255, 235, 235, 0.96);
            color: #d92d20;
            border-color: rgba(239, 83, 80, 0.4);
        }

        .result.info {
            background: rgba(255, 246, 228, 0.96);
            color: #b54708;
            border-color: rgba(245, 158, 11, 0.38);
        }

        .result-summary {
            padding: 0.42rem 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .result-summary span:first-child {
            flex: 1;
            text-align: center;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            font-weight: 800;
        }

        .result-toggle {
            font-size: 1rem;
            margin-left: 0.5rem;
            transition: transform 0.2s ease;
        }

        .result.expandable .result-toggle {
            opacity: 0.9;
        }

        .result-arrow.rotated {
            transform: rotate(180deg);
        }

        .result:not(.expandable) .result-toggle {
            display: none;
        }

        .result-expand-panel {
            width: calc(100% - 0.8rem);
            max-width: 560px;
            margin: 0 auto 0 auto;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            padding: 0 0.85rem;
            border-radius: 1rem;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(245, 249, 253, 0.95));
            color: #1e2b3c;
            border: 1px solid #d9e5ee;
            box-shadow:
                0 12px 24px -22px rgba(18, 40, 60, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.96);
            transition: max-height 0.28s ease, padding 0.28s ease, margin 0.28s ease, opacity 0.2s ease;
            flex-shrink: 0;
        }

        .result-expand-panel.expanded {
            max-height: 260px;
            opacity: 1;
            padding: 0.75rem 0.85rem;
            margin: 0.2rem auto 0.8rem auto;
            overflow-y: auto;
        }

        .result-line {
            font-size: 0.8rem;
            line-height: 1.4;
            text-align: left;
            margin-bottom: 0.45rem;
            color: #496273;
            font-weight: 600;
        }

        .toggle-numbers-btn {
            position: absolute;
            top: 84%;
            left: 78%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(44, 95, 138, 0.84);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.58);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            color: white;
            user-select: none;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.75);
        }

        .instruction-under-canvas {
            font-size: 0.6rem;
            text-align: center;
            color: #7d8f9b;
            margin-top: 0.3rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0;
            margin-bottom: 0.4rem;
            padding: 0.5rem;
            flex-shrink: 0;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid #d9e5ee;
            border-radius: 999px;
            padding: 0.6rem 1.5rem;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            font-weight: 800;
            color: #2c3e4e;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            min-width: 60px;
            margin-bottom: 0.4rem;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
        }

        .opt-btn:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
        }

        .opt-btn.selected {
            background: #2c5f8a;
            border-color: #1e405b;
            color: white;
            box-shadow: 0 12px 22px -16px rgba(44, 95, 138, 0.85);
        }

        .opt-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid #d9e5ee;
            border-radius: 999px;
            padding: 0.4rem 1rem;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            font-weight: 800;
            color: #2c3e4e;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
        }

        .opt-checkbox:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
        }

        .opt-checkbox.selected {
            background: #2c5f8a;
            border-color: #1e405b;
            color: white;
            box-shadow: 0 12px 22px -16px rgba(44, 95, 138, 0.85);
        }

        .opt-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin: 0;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        button {
            background: #1e4663;
            border: none;
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            font-weight: 800;
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.65);
        }

        .btn-check {
            background: #2c7a47;
        }

        .btn-check:hover {
            background: #1f5f36;
            transform: translateY(-1px);
        }

        .btn-new {
            background: #4b6a8b;
        }

        .btn-new:hover {
            background: #2f4b68;
            transform: translateY(-1px);
        }

        .footer-note {
            font-size: 0.6rem;
            text-align: center;
            color: #7d8f9b;
            margin-top: 0.3rem;
            flex-shrink: 0;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 32%),
                rgba(10, 18, 28, 0.78);
            backdrop-filter: blur(7px);
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .zoom-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease;
            transform: scale(1);
            transform-origin: center center;
        }

        .image-stage {
            position: relative;
            display: inline-block;
            line-height: 0;
            max-width: 95vw;
            max-height: 95vh;
        }

        .modal-content {
            display: block;
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 1.4rem;
            box-shadow: 0 28px 70px -28px rgba(0, 0, 0, 0.8);
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .draw-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.4rem;
            cursor: crosshair;
            pointer-events: auto;
            touch-action: none;
            background: transparent;
            box-shadow: none;
        }

        .toolbar-main {
            position: absolute;
            right: 22px;
            bottom: 22px;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.62rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow: 0 24px 48px -24px rgba(0, 0, 0, 0.72);
            z-index: 1002;
        }

        .zoom-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            border: 1px solid #d8e4ee;
            background: linear-gradient(155deg, #ffffff, #edf4fb);
            color: #1e2b3c;
            font-size: 1.18rem;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 22px -18px rgba(18, 40, 60, 0.7);
            transition: all 0.18s ease;
        }

        .zoom-btn:hover:not(:disabled) {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
            box-shadow: 0 14px 26px -18px rgba(18, 40, 60, 0.8);
        }

        .zoom-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.96);
        }

        .zoom-btn:disabled,
        .zoom-btn.disabled {
            opacity: 0.42;
            cursor: not-allowed;
            transform: none;
        }

        #clearDrawBtn {
            background: linear-gradient(155deg, #fff1f1, #ffffff);
            color: #b13e3e;
            border-color: rgba(201, 74, 74, 0.2);
        }

        #clearDrawBtn:hover:not(:disabled) {
            border-color: rgba(201, 74, 74, 0.38);
            background: #fff7f7;
        }

        .color-indicator {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.18s ease;
            border: 4px solid #ffffff;
            outline: 1px solid #cbdbe2;
            box-shadow:
                0 10px 22px -16px rgba(18, 40, 60, 0.8),
                inset 0 0 0 1px rgba(0, 0, 0, 0.14);
            flex: 0 0 auto;
        }

        .color-indicator:hover {
            transform: translateY(-1px) scale(1.03);
            outline-color: #9fb7c8;
        }

        .draw-tools-panel {
            position: absolute;
            right: 22px;
            bottom: 88px;
            width: 300px;
            display: none;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            border-radius: 1.7rem;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow: 0 24px 55px -24px rgba(0, 0, 0, 0.72);
            z-index: 1001;
            animation: drawPanelIn 0.18s ease forwards;
        }

        .draw-tools-panel.show {
            display: flex;
        }

        @keyframes drawPanelIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .draw-panel-title {
            text-align: center;
            color: #1e2b3c;
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #dce5ef;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.55rem;
            justify-items: center;
            align-items: center;
        }

        .color-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.16s ease;
            border: 3px solid #ffffff;
            outline: 1px solid #cbdbe2;
            box-shadow:
                0 10px 20px -16px rgba(18, 40, 60, 0.8),
                inset 0 0 0 1px rgba(0, 0, 0, 0.12);
        }

        .color-circle:hover {
            transform: translateY(-2px) scale(1.08);
            outline-color: #7f9bad;
            box-shadow:
                0 14px 24px -16px rgba(18, 40, 60, 0.9),
                inset 0 0 0 1px rgba(0, 0, 0, 0.14);
        }

        .brush-slider-container {
            width: 100%;
            padding: 0.55rem 0.35rem 0.2rem;
            border-radius: 1.2rem;
            background: linear-gradient(155deg, rgba(238, 246, 252, 0.96), rgba(255, 255, 255, 0.9));
            border: 1px solid #dfe9f1;
        }

        .slider-caption {
            text-align: center;
            color: #607584;
            font-size: 0.76rem;
            font-weight: 800;
            margin-bottom: 0.45rem;
        }

        .slider-track {
            position: relative;
            width: calc(100% - 1.2rem);
            height: 6px;
            margin: 1.1rem auto 1rem;
            border-radius: 999px;
            background: linear-gradient(90deg, #d7e4ee, #9fb7c8);
            cursor: pointer;
        }

        .slider-marks {
            position: absolute;
            top: -7px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .slider-mark {
            width: 18px;
            height: 18px;
            background: #ffffff;
            border: 1px solid #cbdbe2;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 14px -12px rgba(18, 40, 60, 0.85);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.14s ease;
        }

        .slider-mark:hover {
            transform: translateX(-50%) scale(1.12);
            border-color: #9fb7c8;
        }

        .slider-thumb {
            position: absolute;
            top: -9px;
            width: 22px;
            height: 22px;
            background: #2c5f8a;
            border: 3px solid white;
            border-radius: 50%;
            transform: translateX(-50%);
            cursor: grab;
            box-shadow: 0 10px 22px -12px rgba(44, 95, 138, 0.95);
            z-index: 5;
            pointer-events: auto;
            transition: left 0.05s ease, width 0.12s ease, height 0.12s ease, background 0.12s ease;
        }

        .slider-thumb:active {
            cursor: grabbing;
            background: #1e405b;
        }

        .close-modal {
            position: absolute;
            top: 22px;
            right: 26px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: #ffffff;
            font-size: 36px;
            font-weight: 800;
            cursor: pointer;
            z-index: 1003;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 16px 32px -20px rgba(0, 0, 0, 0.8);
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.24);
            transform: scale(1.06);
        }

        @media (max-width: 550px) {
            .game-card {
                padding: 0.5rem 1rem 1rem 1rem;
                border-radius: 1.7rem;
            }

            .back-button {
                top: 12px;
                left: 12px;
                padding: 8px 12px;

<script>
    (function createParticles() {
        const count = 45;

        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');

            const size = Math.random() * 7 + 2;

            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 10 + 7 + 's';
            p.style.animationDelay = Math.random() * -25 + 's';
            p.style.opacity = Math.random() * 0.3 + 0.08;

            document.body.appendChild(p);
        }
    })();
</script>

<div class="game-card">

<script>
    // --------------------------------------------------------------
    // 1. Параметры и настройки
    // --------------------------------------------------------------
    const urlParams = new URLSearchParams(window.location.search);
    const game = urlParams.get('game') || 'alquerque';
    const testMode = urlParams.get('mode') === 'test';

    // Сброс выбранной задачи при смене игры
    const lastGame = localStorage.getItem('lastGame');
    if (lastGame && lastGame !== game) {
        localStorage.removeItem(`selected_task_${lastGame}`);
    }
    localStorage.setItem('lastGame', game);

    // Глобальные настройки кисти
    function saveBrushSettings(color, posIndex) {
        if (!testMode) {
            localStorage.setItem('globalBrushColor', color);
            localStorage.setItem('globalBrushPosIndex', posIndex);
        }
    }

    function loadBrushSettings() {
        const color = localStorage.getItem('globalBrushColor');
        const posIndex = localStorage.getItem('globalBrushPosIndex');
        return {
            color: color || '#ffffff',
            posIndex: posIndex !== null ? parseInt(posIndex) : 1
        };
    }

    document.getElementById('backButton').addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    // --------------------------------------------------------------
    // 2. Загрузка конфигурации игры
    // --------------------------------------------------------------
    let gameConfig = null;

    async function loadGameConfig(gameId) {
        try {
            const response = await fetch(`games/${gameId}/config.json`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        } catch (error) {
            console.error(error);
            return null;
        }
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = () => reject(new Error(`Не удалось загрузить ${src}`));
            document.head.appendChild(script);
        });
    }

    // --------------------------------------------------------------
    // 3. Основная логика тренажёра
    // --------------------------------------------------------------
    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    const questionDiv = document.getElementById('question');
    const boardWrapper = document.getElementById('boardWrapper');
    const toggleBtn = document.getElementById('toggleNumbersBtn');
    const resultDiv = document.getElementById('result');
    const resultMessageSpan = document.getElementById('resultMessage');
    const resultArrow = document.getElementById('resultArrow');
    const resultExpandPanel = document.getElementById('resultExpandPanel');

    let cellsCountGlobal = 25;
    let pieceImages = {};
    let fieldImg = new Image();
    let imagesLoaded = false;
    let loadCounter = 0;
    let totalImagesToLoad = 1;

    function checkImages() {
        loadCounter++;
        if (loadCounter === totalImagesToLoad) {
            imagesLoaded = true;
            if (typeof startGameAfterImages === 'function') startGameAfterImages();
        }
    }

    function resetImages() {
        imagesLoaded = false;
        loadCounter = 0;
        fieldImg = new Image();
        fieldImg.onload = checkImages;
        pieceImages = {};
    }

    let currentTask = null,
        selectedValues = [],
        selectedValueSingle = null,
        answerGiven = false,
        numbersVisible = false,
        resultExpanded = false,
        warningTimer = null;

    function drawNative(position, highlights, greenNumbers = null, showCellNumbers = false, highlightedCell = null, targets = null) {
        if (!imagesLoaded) return;

        const originalCenters = window.originalCenters || {};
        if (Object.keys(originalCenters).length === 0) return;

        canvas.width = fieldImg.width;
        canvas.height = fieldImg.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(fieldImg, 0, 0);

        const pieceSize = 72.2835 * 4;
        const half = pieceSize / 2;

        for (const cellStr in position) {
            const cell = parseInt(cellStr, 10);
            const color = position[cell];
            const orig = originalCenters[cell];

            if (!orig) continue;

            const img = pieceImages[color];

            if (!img) continue;

            ctx.drawImage(img, orig.x - half, orig.y - half, pieceSize, pieceSize);
        }

        if (highlightedCell && originalCenters[highlightedCell]) {
            const orig = originalCenters[highlightedCell];

            ctx.beginPath();
            ctx.arc(orig.x, orig.y, pieceSize / 2 + 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 255, 0, 0.45)';
            ctx.fill();
            ctx.strokeStyle = 'gold';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        if (highlights) {
            for (const colorName in highlights) {
                ctx.fillStyle = colorName === 'red'
                    ? 'rgba(255, 80, 80, 0.45)'
                    : 'rgba(80, 255, 80, 0.45)';

                for (const cellStr of highlights[colorName]) {
                    const cell = parseInt(cellStr, 10);
                    const orig = originalCenters[cell];

                    if (!orig) continue;

                    const r = pieceSize / 2 + 4;

                    ctx.beginPath();
                    ctx.arc(orig.x, orig.y, r, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }

        if (greenNumbers && typeof window.drawGreenNumbers === 'function') {
            window.drawGreenNumbers(ctx, originalCenters, greenNumbers, pieceSize);
        }

        if (targets) {
            ctx.font = `bold ${Math.floor(pieceSize * 0.35)}px "Inter", system-ui`;
            ctx.fillStyle = 'black';
            ctx.shadowBlur = 0;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (const cellStr in targets) {
                const cell = parseInt(cellStr, 10);
                const num = targets[cell];
                const orig = originalCenters[cell];

                if (!orig) continue;

                ctx.fillStyle = 'white';
                ctx.fillRect(orig.x - 12, orig.y - 12, 24, 24);
                ctx.fillStyle = 'black';
                ctx.fillText(num, orig.x, orig.y);
            }
        }

        if (showCellNumbers) {
            const cell1 = originalCenters[1];
            const cell2 = originalCenters[2];

            if (cell1 && cell2) {
                const dx = cell2.x - cell1.x;
                const dy = cell2.y - cell1.y;
                const cellDist = Math.hypot(dx, dy);
                const fontSize = Math.floor(cellDist * 0.3);

                ctx.font = `bold ${fontSize}px "Inter", system-ui`;
                ctx.fillStyle = 'white';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 3;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const maxCell = cellsCountGlobal || 25;

                for (let i = 1; i <= maxCell; i++) {
                    const center = originalCenters[i];

                    if (!center) continue;

                    ctx.fillText(i.toString(), center.x, center.y);
                }

                ctx.shadowBlur = 0;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }
        }
    }

    function redrawCurrent() {
        const greenNumbers = currentTask?.green_numbers || null;
        const highlightedCell = currentTask?.highlighted_cell || null;
        const targets = currentTask?.targets || null;

        drawNative(
            currentTask?.position || {},
            currentTask?.highlights || {},
            greenNumbers,
            numbersVisible,
            highlightedCell,
            targets
        );

        if (answerGiven) toggleBtn.innerHTML = numbersVisible ? '🚫' : '👁️';
    }

    function toggleNumbers() {
        if (!answerGiven) return;
        numbersVisible = !numbersVisible;
        redrawCurrent();
    }

    // ---------- Модальное окно ----------
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const zoomContainer = document.getElementById('zoomContainer');
    const imageStage = document.getElementById('imageStage');
    const closeBtn = document.getElementById('closeModalBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const clearDrawBtn = document.getElementById('clearDrawBtn');
    const drawCanvasElem = document.getElementById('drawCanvas');
    const drawCtx = drawCanvasElem.getContext('2d');
    const isDesktopLike = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    let currentScale = 1,
        MIN_SCALE = 0.6,
        MAX_SCALE = isDesktopLike ? 1 : 3;

    let strokes = [],
        currentStroke = null,
        isDrawing = false,
        drawingPointerId = null,
        isPinching = false,
        initialDistance = 0,
        initialScale = 1;

    let currentDrawColor = '#ffffff',
        currentBrushSize = 8;

    let isDraggingThumb = false;

    const sliderTrack = document.getElementById('sliderTrack');
    const sliderThumb = document.getElementById('sliderThumb');
    const positions = [0, 25, 50, 75, 100];

    let brushSizes = [4, 10, 18, 28, 40];
    let currentPosIndex = 1;

    function setBrushByIndex(index) {
        if (index < 0) index = 0;
        if (index >= positions.length) index = positions.length - 1;

        currentPosIndex = index;

        let percent = positions[currentPosIndex];

        sliderThumb.style.left = `${percent}%`;

        currentBrushSize = brushSizes[currentPosIndex];

        let thumbScale = 0.5 + currentBrushSize / 80;
        let thumbSize = 20 * thumbScale;

        sliderThumb.style.width = `${Math.min(32, thumbSize)}px`;
        sliderThumb.style.height = `${Math.min(32, thumbSize)}px`;

        saveBrushSettings(currentDrawColor, currentPosIndex);
    }

    function updateBrushSizes() {
        const standardWidth = Math.max(6, drawCanvasElem.width * 0.007);
        const multipliers = [0.4, 1.0, 1.8, 2.8, 4.0];

        brushSizes = multipliers.map(m => Math.round(standardWidth * m));
        brushSizes = brushSizes.map(s => Math.min(80, Math.max(4, s)));

        setBrushByIndex(currentPosIndex);
    }

    function snapToNearestPosition(percent) {
        let nearest = 0,
            minDiff = Math.abs(percent - positions[0]);

        for (let i = 1; i < positions.length; i++) {
            let diff = Math.abs(percent - positions[i]);

            if (diff < minDiff) {
                minDiff = diff;
                nearest = i;
            }
        }

        setBrushByIndex(nearest);
    }

    function handleSliderInteraction(clientX) {
        const rect = sliderTrack.getBoundingClientRect();

        let relX = clientX - rect.left;
        let percent = (relX / rect.width) * 100;

        percent = Math.min(100, Math.max(0, percent));

        snapToNearestPosition(percent);
    }

    sliderTrack.addEventListener('click', e => {
        e.stopPropagation();
        handleSliderInteraction(e.clientX);
    });

    document.querySelectorAll('.slider-mark').forEach(mark => {
        mark.addEventListener('click', e => {
            e.stopPropagation();

            const percent = parseFloat(mark.style.left);

            snapToNearestPosition(percent);
        });
    });

    function onMove(e) {
        if (!isDraggingThumb) return;

        e.preventDefault();

        let clientX = e.touches ? e.touches[0].clientX : e.clientX;

        handleSliderInteraction(clientX);
    }

    function onEnd() {
        if (isDraggingThumb) {
            isDraggingThumb = false;

            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onEnd);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
        }
    }

    sliderThumb.addEventListener('mousedown', e => {
        e.preventDefault();
        e.stopPropagation();

        isDraggingThumb = true;

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
    });

    sliderThumb.addEventListener('touchstart', e => {
        e.preventDefault();
        e.stopPropagation();

        isDraggingThumb = true;

        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
    });

    const colorIndicatorBtn = document.getElementById('colorIndicator');
    const drawToolsPanel = document.getElementById('drawToolsPanel');

    colorIndicatorBtn.addEventListener('click', e => {
        e.stopPropagation();
        drawToolsPanel.classList.toggle('show');
    });

    document.addEventListener('click', e => {
        if (!drawToolsPanel.contains(e.target) && e.target !== colorIndicatorBtn) {
            drawToolsPanel.classList.remove('show');
        }
    });

    document.querySelectorAll('#colorPalette .color-circle').forEach(circle => {
        circle.addEventListener('click', e => {
            e.stopPropagation();

            currentDrawColor = circle.dataset.color;
            colorIndicatorBtn.style.backgroundColor = currentDrawColor;

            drawToolsPanel.classList.remove('show');

            saveBrushSettings(currentDrawColor, currentPosIndex);
        });
    });

    if (testMode) {
        localStorage.removeItem('globalBrushColor');
        localStorage.removeItem('globalBrushPosIndex');

        currentDrawColor = '#ffffff';
        currentPosIndex = 1;
    } else {
        const saved = loadBrushSettings();

        currentDrawColor = saved.color;
        currentPosIndex = saved.posIndex;
    }

    colorIndicatorBtn.style.backgroundColor = currentDrawColor;
    setBrushByIndex(currentPosIndex);

    function updateZoomButtons() {
        const atMin = currentScale <= MIN_SCALE + 0.001;
        const atMax = currentScale >= MAX_SCALE - 0.001;

        zoomOutBtn.disabled = atMin;
        zoomInBtn.disabled = atMax;

        zoomOutBtn.classList.toggle('disabled', atMin);
        zoomInBtn.classList.toggle('disabled', atMax);
    }

    function updateScale(newScale) {
        const clamped = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));

        currentScale = clamped;
        zoomContainer.style.transform = `scale(${currentScale})`;

        updateZoomButtons();
    }

    function preventScroll(e) {
        e.preventDefault();
    }

    function handleWheel(e) {
        if (modal.style.display !== 'flex') return;

        e.preventDefault();

        const delta = e.deltaY < 0 ? 0.12 : -0.12;

        updateScale(currentScale + delta);
    }

    function getTouchDistance(e) {
        return Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }

    function onTouchStart(e) {
        if (modal.style.display !== 'flex') return;

        if (e.touches.length === 2) {
            e.preventDefault();

            isPinching = true;

            cancelDrawing();

            initialDistance = getTouchDistance(e);
            initialScale = currentScale;
        }
    }

    function onTouchMove(e) {
        if (modal.style.display !== 'flex') return;

        if (e.touches.length === 2) {
            e.preventDefault();

            const newDistance = getTouchDistance(e);

            if (initialDistance > 0) {
                updateScale(initialScale * (newDistance / initialDistance));
            }
        }
    }

    function onTouchEnd(e) {
        if (e.touches.length < 2) {
            initialDistance = 0;
            initialScale = currentScale;
            isPinching = false;
        }
    }

    function syncDrawCanvasToImage() {
        if (!modalImg.naturalWidth || !modalImg.naturalHeight) return;

        drawCanvasElem.width = modalImg.naturalWidth;
        drawCanvasElem.height = modalImg.naturalHeight;

        redrawAllStrokes();
        updateBrushSizes();
    }

    function redrawAllStrokes() {
        drawCtx.clearRect(0, 0, drawCanvasElem.width, drawCanvasElem.height);
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';

        for (const stroke of strokes) {
            if (!stroke.points.length) continue;

            drawCtx.beginPath();
            drawCtx.strokeStyle = stroke.color;
            drawCtx.lineWidth = stroke.width;
            drawCtx.moveTo(stroke.points[0].x, stroke.points[0].y);

            for (let i = 1; i < stroke.points.length; i++) {
                drawCtx.lineTo(stroke.points[i].x, stroke.points[i].y);
            }

            drawCtx.stroke();
        }
    }

    function getCanvasPointFromEvent(e) {
        const rect = drawCanvasElem.getBoundingClientRect();

        return {
            x: (e.clientX - rect.left) * (drawCanvasElem.width / rect.width),
            y: (e.clientY - rect.top) * (drawCanvasElem.height / rect.height)
        };
    }

    function startDrawing(e) {
        if (modal.style.display !== 'flex') return;
        if (isPinching) return;

        e.preventDefault();

        isDrawing = true;
        drawingPointerId = e.pointerId;

        if (drawCanvasElem.setPointerCapture) {
            drawCanvasElem.setPointerCapture(e.pointerId);
        }

        const p = getCanvasPointFromEvent(e);

        currentStroke = {
            color: currentDrawColor,
            width: currentBrushSize,
            points: [p]
        };

        strokes.push(currentStroke);

        redrawAllStrokes();
    }

    function moveDrawing(e) {
        if (!isDrawing || e.pointerId !== drawingPointerId) return;

        e.preventDefault();

        const p = getCanvasPointFromEvent(e);
        const last = currentStroke.points[currentStroke.points.length - 1];

        if (Math.hypot(p.x - last.x, p.y - last.y) < 2) return;

        const smooth = {
            x: last.x + (p.x - last.x) * 0.55,
            y: last.y + (p.y - last.y) * 0.55
        };

        currentStroke.points.push(smooth);

        redrawAllStrokes();
    }

    function stopDrawing(e) {
        if (e.pointerId !== drawingPointerId) return;

        if (drawCanvasElem.releasePointerCapture && drawCanvasElem.hasPointerCapture(e.pointerId)) {
            drawCanvasElem.releasePointerCapture(e.pointerId);
        }

        isDrawing = false;
        drawingPointerId = null;
        currentStroke = null;
    }

    function cancelDrawing() {
        isDrawing = false;
        drawingPointerId = null;
        currentStroke = null;
    }

    function clearDrawing() {
        strokes = [];
        redrawAllStrokes();
    }

    function openModal() {
        const dataUrl = canvas.toDataURL('image/png');

        modalImg.onload = () => syncDrawCanvasToImage();
        modalImg.src = dataUrl;

        updateScale(1);

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        document.body.addEventListener('touchmove', preventScroll, { passive: false });
        window.addEventListener('wheel', handleWheel, { passive: false });
        document.addEventListener('touchstart', onTouchStart, { passive: false });
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);
        document.addEventListener('touchcancel', onTouchEnd);
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = '';

        document.body.removeEventListener('touchmove', preventScroll);
        window.removeEventListener('wheel', handleWheel);
        document.removeEventListener('touchstart', onTouchStart);
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
        document.removeEventListener('touchcancel', onTouchEnd);

        cancelDrawing();

        modalImg.src = '';
    }

    drawCanvasElem.addEventListener('pointerdown', startDrawing);
    drawCanvasElem.addEventListener('pointermove', moveDrawing);
    drawCanvasElem.addEventListener('pointerup', stopDrawing);
    drawCanvasElem.addEventListener('pointercancel', stopDrawing);

    modal.addEventListener('click', e => {
        if (isDraggingThumb) return;

        if (
            e.target === modal ||
            e.target === modalImg ||
            e.target === zoomContainer ||
            e.target === imageStage
        ) {
            closeModal();
        }
    });

    closeBtn.addEventListener('click', e => {
        e.stopPropagation();
        closeModal();
    });

    zoomInBtn.addEventListener('click', e => {
        e.stopPropagation();

        if (!zoomInBtn.disabled) updateScale(currentScale + 0.15);
    });

    zoomOutBtn.addEventListener('click', e => {
        e.stopPropagation();

        if (!zoomOutBtn.disabled) updateScale(currentScale - 0.15);
    });

    clearDrawBtn.addEventListener('click', e => {
        e.stopPropagation();
        clearDrawing();
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
    });

    canvas.addEventListener('click', openModal);

    // ---------- Интерфейс тренажёра ----------
    const taskSelect = document.getElementById('taskSelect');
    const optionsContainer = document.getElementById('optionsContainer');
    const checkBtn = document.getElementById('checkBtn');
    const newBtn = document.getElementById('newBtn');

    function clearBoardState() {
        canvas.classList.remove('correct', 'wrong');
    }

    function hideResult() {
        if (warningTimer) clearTimeout(warningTimer);

        resultDiv.classList.remove('show', 'correct', 'wrong', 'info', 'expandable');
        resultArrow.classList.remove('rotated');
        resultExpandPanel.classList.remove('expanded');

        resultMessageSpan.innerText = '';
        resultExpandPanel.innerHTML = '';

        boardWrapper.classList.remove('show-result');

        clearBoardState();

        resultExpanded = false;
    }

    function showResult(message, type, explanation, autoHide = false) {
        if (warningTimer) clearTimeout(warningTimer);

        boardWrapper.classList.add('show-result');
        resultMessageSpan.innerText = message;

        resultDiv.classList.remove('correct', 'wrong', 'info', 'expandable');
        resultDiv.classList.add('show', type);

        resultExpandPanel.innerHTML = explanation
            ? explanation.split('; ').map(line => `<div class="result-line">${line}</div>`).join('')
            : '';

        const canExpand = !!(explanation && explanation.trim());

        if (canExpand) resultDiv.classList.add('expandable');

        resultArrow.classList.remove('rotated');
        resultExpandPanel.classList.remove('expanded');

        resultExpanded = false;

        if (autoHide) warningTimer = setTimeout(() => hideResult(), 3000);
    }

    function renderOptions(task) {
        optionsContainer.innerHTML = '';
        selectedValues = [];
        selectedValueSingle = null;

        if (task.answer_type === 'multiple') {
            task.options.forEach(opt => {
                const wrapper = document.createElement('label');
                wrapper.className = 'opt-checkbox';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = opt.id;

                cb.addEventListener('change', e => {
                    if (e.target.checked) {
                        if (!selectedValues.includes(opt.id)) selectedValues.push(opt.id);
                    } else {
                        selectedValues = selectedValues.filter(v => v !== opt.id);
                    }

                    wrapper.classList.toggle('selected', e.target.checked);
                });

                const span = document.createElement('span');
                span.innerText = opt.text;

                wrapper.appendChild(cb);
                wrapper.appendChild(span);
                optionsContainer.appendChild(wrapper);
            });
        } else {
            task.options.forEach(opt => {
                const btn = document.createElement('button');

                btn.className = 'opt-btn';
                btn.innerText = opt.text;
                btn.dataset.id = opt.id;

                btn.addEventListener('click', () => {
                    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));

                    btn.classList.add('selected');

                    selectedValueSingle = opt.id;
                });

                optionsContainer.appendChild(btn);
            });
        }
    }

    function buildTaskSelect() {
        if (!window.taskTitles) return;

        taskSelect.innerHTML = '';

        const keys = Object.keys(window.taskTitles).sort((a, b) => Number(a) - Number(b));

        for (const key of keys) {
            const option = document.createElement('option');

            option.value = key;
            option.textContent = window.taskTitles[key];

            taskSelect.appendChild(option);
        }

        if (taskSelect.options.length === 0) {
            const opt = document.createElement('option');

            opt.textContent = 'Нет доступных задач';
            opt.disabled = true;

            taskSelect.appendChild(opt);
        }
    }

    function refreshTask() {
        const selectedType = taskSelect.value;
        const generator = window.taskGenerators?.[selectedType];

        clearDrawing();

        if (modal.style.display === 'flex') closeModal();

        hideResult();

        canvas.classList.remove('correct', 'wrong');

        if (!generator) {
            currentTask = null;
            questionDiv.innerText = '⚠️ Генератор задачи не найден';
            optionsContainer.innerHTML = '';

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            showResult('⚠️ Генератор задачи не найден', 'info', '');

            return;
        }

        const task = generator();

        currentTask = task;
        answerGiven = false;
        numbersVisible = false;

        toggleBtn.style.display = 'none';
        questionDiv.innerText = task.question || 'Задача без текста';

        renderOptions(currentTask);
        redrawCurrent();

        selectedValues = [];
        selectedValueSingle = null;
    }

    function checkAnswer() {
        if (!currentTask) {
            showResult('⚠️ Задача не загружена', 'info', '');
            return;
        }

        let isCorrect = false;

        if (currentTask.answer_type === 'multiple') {
            if (!selectedValues.length) {
                showResult('⚠️ Выберите хотя бы один вариант', 'info', '', true);
                return;
            }

            const correctSet = new Set(currentTask.correct);
            const selectedSet = new Set(selectedValues);

            if (
                selectedSet.size === correctSet.size &&
                [...selectedSet].every(v => correctSet.has(v))
            ) {
                isCorrect = true;
            }
        } else {
            if (!selectedValueSingle) {
                showResult('⚠️ Выберите вариант ответа', 'info', '', true);
                return;
            }

            isCorrect = selectedValueSingle === currentTask.correct;
        }

        clearBoardState();

        if (isCorrect) {
            canvas.classList.add('correct');
            showResult('✅ Верно! Отличная работа.', 'correct', currentTask.explanation || '');
        } else {
            canvas.classList.add('wrong');

            const correctStr = currentTask.answer_type === 'multiple'
                ? currentTask.correct.join(', ')
                : currentTask.correct;

            showResult(`❌ Неверно. Правильный ответ: ${correctStr}`, 'wrong', currentTask.explanation || '');
        }

        clearDrawing();

        answerGiven = true;
        numbersVisible = true;

        toggleBtn.style.display = 'flex';

        redrawCurrent();
    }

    const resultSummary = resultDiv.querySelector('.result-summary');

    resultSummary.addEventListener('click', e => {
        e.stopPropagation();

        if (!resultDiv.classList.contains('expandable')) return;

        resultExpanded = !resultExpanded;

        resultArrow.classList.toggle('rotated', resultExpanded);
        resultExpandPanel.classList.toggle('expanded', resultExpanded);

        if (resultExpandPanel.classList.contains('expanded') && window.innerWidth <= 550) {
            setTimeout(() => resultExpandPanel.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            }), 100);
        }
    });

    toggleBtn.addEventListener('click', e => {
        e.stopPropagation();

        if (answerGiven) toggleNumbers();
    });

    newBtn.addEventListener('click', refreshTask);
    checkBtn.addEventListener('click', checkAnswer);

    taskSelect.addEventListener('change', () => {
        localStorage.setItem(`selected_task_${game}`, taskSelect.value);
        refreshTask();
    });

    let startGameAfterImages = null;

    async function startGame() {
        gameConfig = await loadGameConfig(game);

        if (!gameConfig) {
            document.getElementById('gameTitle').innerText = 'Ошибка загрузки игры';
            document.title = 'Ошибка';
            questionDiv.innerText = 'Не удалось загрузить конфигурацию игры. Проверьте наличие папки и файла config.json.';

            return;
        }

        document.getElementById('gameTitle').innerText = gameConfig.gameName + ' тренажёр';
        document.title = gameConfig.gameName;

        cellsCountGlobal = gameConfig.cellsCount || 25;

        resetImages();

        const gameFolder = `games/${game}/`;
        const boardPath = gameConfig.images?.board || 'pole.png';

        fieldImg.src = `${gameFolder}${boardPath}`;
        fieldImg.onload = checkImages;

        const piecesConfig = gameConfig.images?.pieces;

        if (!piecesConfig) {
            console.error('В config.json отсутствует images.pieces');
            return;
        }

        const pieceKeys = Object.keys(piecesConfig);

        totalImagesToLoad = 1 + pieceKeys.length;

        for (const color of pieceKeys) {
            const img = new Image();

            img.src = `${gameFolder}${piecesConfig[color]}`;
            img.onload = checkImages;

            pieceImages[color] = img;
        }

        const taskFiles = gameConfig.taskFiles || ['task1.js'];

        try {
            await Promise.allSettled(taskFiles.map(file => loadScript(`${gameFolder}${file}`)));
        } catch (error) {
            console.warn('Некоторые задачи не загрузились:', error);
        }

        startGameAfterImages = () => {
            buildTaskSelect();

            const savedType = localStorage.getItem(`selected_task_${game}`);

            if (savedType && Array.from(taskSelect.options).some(opt => opt.value === savedType)) {
                taskSelect.value = savedType;
            } else {
                taskSelect.selectedIndex = 0;
            }

            refreshTask();
        };

        if (imagesLoaded) startGameAfterImages();
    }

    startGame();
</script>
