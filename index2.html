<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>viaVUCA · Выбор игры</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            scroll-behavior: auto !important;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
                radial-gradient(circle at bottom right, rgba(125, 158, 190, 0.22), transparent 38%),
                linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1e2b3c;
            padding: 0.6rem 1rem 0.6rem;
            overflow-x: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        body.mode-train {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
                radial-gradient(circle at bottom right, rgba(125, 158, 190, 0.22), transparent 38%),
                linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
        }

        body.mode-test {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 34%),
                radial-gradient(circle at bottom right, rgba(83, 144, 122, 0.18), transparent 38%),
                linear-gradient(145deg, #d4ece7 0%, #c2ded6 100%);
        }

        .particle {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(100, 120, 150, 0.16);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 1;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(105vh) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 0.45;
            }

            80% {
                opacity: 0.45;
            }

            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .page-shell {
            position: relative;
            z-index: 10;
            width: min(1316px, 100%);
            margin: 0 auto;
            padding-left: 0;
        }

        .side-back {
            position: absolute;
            left: auto;
            right: calc(100% + 1.1rem);
            top: 0;
            z-index: 20;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(6px);
            border: 1px solid #cbdbe2;
            border-radius: 999px;
            color: #1a3b4f;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 0.65rem 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -16px rgba(18, 40, 60, 0.5);
            white-space: nowrap;
        }

        .back-button:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateX(-2px);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
        }

        .main-card {
            position: relative;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 2.6rem;
            box-shadow: 0 24px 55px -22px rgba(18, 40, 60, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 2.4rem 3rem 3rem 3rem;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.05) forwards;
            opacity: 0;
            transform: translateY(18px);
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .header-left {
            width: 100%;
            max-width: 980px;
            min-width: 0;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.15rem, 4.1vw, 3.65rem);
            line-height: 1.18;
            font-weight: 800;
            letter-spacing: -0.055em;
            background: linear-gradient(135deg, #172637, #2a4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.7rem;
            padding-bottom: 0.06em;
            text-align: center;
            white-space: nowrap;
            overflow: visible;
        }

        .header-text {
            max-width: 760px;
            margin: 0 auto;
            color: #5a6e7c;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 500;
            text-align: center;
        }

        .mode-panel {
            width: min(880px, 100%);
            background: linear-gradient(155deg, rgba(238, 246, 252, 0.96), rgba(255, 255, 255, 0.9));
            border: 1px solid #dfe9f1;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
            margin: 0 auto;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .mode-btn {
            width: 100%;
            border: 1px solid #d9e5ee;
            background: rgba(255, 255, 255, 0.82);
            border-radius: 1.2rem;
            padding: 0.82rem 1.15rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #1e2b3c;
            text-align: left;
            min-width: 0;
        }

        .mode-btn:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
        }

        .mode-btn.active {
            background: #2c7a47;
            border-color: #226239;
            color: #ffffff;
            box-shadow: 0 12px 22px -16px rgba(44, 122, 71, 0.95);
        }

        .mode-btn.test-active {
            background: #2c5f8a;
            border-color: #1e405b;
            color: #ffffff;
            box-shadow: 0 12px 22px -16px rgba(44, 95, 138, 0.85);
        }

        .mode-main {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 0.18rem;
            white-space: nowrap;
        }

        .mode-desc {
            font-size: 0.78rem;
            line-height: 1.35;
            opacity: 0.82;
            padding-left: 1.95rem;
            white-space: nowrap;
        }

        .current-mode-strip {
            display: flex;
            justify-content: center;
            margin-bottom: 1.4rem;
        }

        .mode-description {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            color: #496273;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            font-size: 0.92rem;
            font-weight: 700;
            text-align: center;
        }

        .mobile-games-view-toolbar {
            display: none;
        }

        .games-view-toggle {
            width: 42px;
            height: 42px;
            border: 1px solid #d9e5ee;
            background: rgba(255, 255, 255, 0.88);
            color: #1a3b4f;
            border-radius: 999px;
            font-family: inherit;
            font-size: 1.08rem;
            font-weight: 900;
            cursor: pointer;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            box-shadow: 0 10px 18px -16px rgba(18, 40, 60, 0.55);
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        #gamesViewToggleText {
            display: none;
        }

        .games-view-toggle:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
        }

        .games-view-toggle.active {
            background: #2c5f8a;
            border-color: #1e405b;
            color: #ffffff;
            box-shadow: 0 12px 22px -16px rgba(44, 95, 138, 0.85);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
            gap: 1.1rem;
        }

        .games-carousel-dots {
            display: none;
        }

        .games-carousel-dot {
            width: 0.58rem;
            height: 0.58rem;
            border: none;
            border-radius: 999px;
            background: #c7d6e2;
            cursor: pointer;
            padding: 0;
            transition: all 0.18s ease;
        }

        .games-carousel-dot.active {
            width: 1.55rem;
            background: #2c5f8a;
        }

        .game-card {
            position: relative;
            overflow: hidden;
            min-height: 185px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid #d9e5ee;
            border-radius: 1.45rem;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #1e2b3c;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
        }

        .game-card::before {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            right: -45px;
            top: -45px;
            border-radius: 50%;
            background: rgba(44, 95, 138, 0.08);
            transition: 0.2s ease;
            z-index: 1;
        }

        .game-card.has-image::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.94) 0%,
                    rgba(255, 255, 255, 0.86) 45%,
                    rgba(255, 255, 255, 0.58) 100%
                ),
                var(--game-bg-image);
            background-repeat: no-repeat;
            pointer-events: none;
            transition: opacity 0.2s ease, filter 0.2s ease, transform 0.2s ease;
        }

        /* DESKTOP: АЛЬКЕРК — img/alk.png */
        .game-card.game-bg-alquerque::after {
            background-position: 97% 90%;
            background-size: auto 60%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-alquerque:hover::after {
            background-position: 97% 90%;
            background-size: auto 65%;
            opacity: 1;
            filter: blur(0.6px) saturate(1.05);
            transform: scale(1.05);
        }

        /* DESKTOP: СУРАКАРТА — img/sura.png */
        .game-card.game-bg-surakarta::after {
            background-position: 100% 90%;
            background-size: auto 75%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-surakarta:hover::after {
            background-position: 100% 90%;
            background-size: auto 75%;
            opacity: 1;
            filter: blur(0.6px) saturate(1.05);
            transform: scale(1.05);
        }

        /* DESKTOP: ФАНОРОНА — img/fan.png */
        .game-card.game-bg-fanorona::after {
            background-position: 95% 90%;
            background-size: auto 60%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-fanorona:hover::after {
            background-position: 95% 90%;
            background-size: auto 60%;
            opacity: 1;
            filter: blur(0.6px) saturate(1.05);
            transform: scale(1.05);
        }

        /* DESKTOP: ДАБЛОТ — img/dabl.png */
        .game-card.game-bg-dablot::after {
            background-position: 90% 90%;
            background-size: auto 40%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-dablot:hover::after {
            background-position: 90% 90%;
            background-size: auto 40%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        /* DESKTOP: ХНЕФАТАФЛ — img/hnef.png */
        .game-card.game-bg-hnefatafl::after {
            background-position: 105% 85%;
            background-size: auto 65%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-hnefatafl:hover::after {
            background-position: 105% 85%;
            background-size: auto 65%;
            opacity: 1;
            filter: blur(0.6px) saturate(1.05);
            transform: scale(1.05);
        }

        /* DESKTOP: СИДЖА — img/sig.png */
        .game-card.game-bg-sidja::after {
            background-position: 100% 85%;
            background-size: auto 70%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-sidja:hover::after {
            background-position: 100% 85%;
            background-size: auto 70%;
            opacity: 1;
            filter: blur(0.6px) saturate(1.05);
            transform: scale(1.05);
        }

        /* DESKTOP: РЕВЕРСИ — img/rev.png */
        .game-card.game-bg-reversi::after {
            background-position: 95% 87%;
            background-size: auto 70%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-reversi:hover::after {
            background-position: 95% 87%;
            background-size: auto 70%;
            opacity: 1;
            filter: blur(0.6px) saturate(1.05);
            transform: scale(1.05);
        }

        /* DESKTOP: СТОЛБОВЫЕ ШАШКИ — img/shash.png */
        .game-card.game-bg-stolbovye::after {
            background-position: 95% 92%;
            background-size: auto 80%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-card.game-bg-stolbovye:hover::after {
            background-position: 95% 92%;
            background-size: auto 80%;
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        /* DESKTOP: СБОРНЫЙ ТЕСТ — logo/logo.svg */
        .game-card.game-bg-mixed::after {
            background-position: 90% 85%;
            background-size: auto 45%;
            opacity: 0.9;
            filter: blur(0.4px) saturate(0.95);
            transform: scale(1.02);
        }

        .game-card.game-bg-mixed:hover::after {
            background-position: 90% 85%;
            background-size: auto 45%;
            opacity: 1;
            filter: blur(0.2px) saturate(1);
            transform: scale(1.04);
        }

        .game-card:hover {
            background: #ffffff;
            border-color: #9fb7c8;
            transform: translateY(-4px);
            box-shadow: 0 18px 34px -24px rgba(18, 40, 60, 0.65);
        }

        .game-card:hover::before {
            transform: scale(1.15);
            background: rgba(44, 122, 71, 0.1);
        }

        .game-card.unavailable {
            cursor: default;
            opacity: 0.78;
        }

        .game-card.unavailable:hover {
            transform: none;
            border-color: #d9e5ee;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
        }

        .game-card.unavailable.has-image:hover::after {
            opacity: 1;
            filter: blur(0.8px) saturate(1);
            transform: scale(1.03);
        }

        .game-top {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.8rem;
        }

        .game-title {
            font-size: 1.28rem;
            line-height: 1.15;
            font-weight: 800;
            color: #1a3b4f;
        }

        .game-badge {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.28rem 0.65rem;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 800;
            background: rgba(44, 122, 71, 0.12);
            color: #2c7a47;
            white-space: nowrap;
        }

        .game-badge.unavailable {
            background: rgba(201, 74, 74, 0.12);
            color: #c94a4a;
        }

        .game-desc {
            position: relative;
            z-index: 2;
            color: #607584;
            font-size: 0.9rem;
            line-height: 1.48;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .game-action {
            position: relative;
            z-index: 2;
            margin-top: auto;
            color: #2c5f8a;
            font-size: 0.82rem;
            font-weight: 800;
        }

        .game-card.unavailable .game-action {
            color: #9aa8b2;
        }

        .info-message {
            position: fixed;
            left: 50%;
            bottom: 1.2rem;
            transform: translateX(-50%);
            z-index: 1000;
            max-width: calc(100% - 2rem);
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border: 1px solid #d9e5ee;
            box-shadow: 0 18px 35px -20px rgba(18, 40, 60, 0.65);
            padding: 0.85rem 1.1rem;
            border-radius: 999px;
            color: #496273;
            font-size: 0.88rem;
            font-weight: 700;
            text-align: center;
            display: none;
        }

        .footer-note {
            color: #718493;
            text-align: center;
            font-size: 0.74rem;
            margin-top: 0.85rem;
            line-height: 1.4;
        }



        .sticky-mode-switch {
            display: none;
        }

        @media (max-width: 1000px) {
            .sticky-mode-switch {
                position: fixed;
                top: calc(0.55rem + env(safe-area-inset-top));
                left: 50%;
                z-index: 2500;
                width: min(520px, calc(100% - 1.6rem));
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.35rem;
                padding: 0.35rem;
                border-radius: 999px;
                background: linear-gradient(155deg, rgba(238, 246, 252, 0.84), rgba(255, 255, 255, 0.76));
                backdrop-filter: blur(18px) saturate(1.18);
                -webkit-backdrop-filter: blur(18px) saturate(1.18);
                border: 1px solid #cbdbe2;
                box-shadow:
                    0 16px 34px -22px rgba(18, 40, 60, 0.78),
                    inset 0 1px 0 rgba(255, 255, 255, 0.86);
                opacity: 0;
                pointer-events: none;
                transform: translateX(-50%) translateY(-12px);
                transition: opacity 0.18s ease, transform 0.18s ease;
            }

            .sticky-mode-switch.visible {
                opacity: 1;
                pointer-events: auto;
                transform: translateX(-50%) translateY(0);
            }

            .sticky-mode-btn {
                min-width: 0;
                border: 1px solid #d9e5ee;
                border-radius: 999px;
                background: rgba(244, 249, 255, 0.92);
                color: #1a3b4f;
                font-family: inherit;
                font-size: 0.82rem;
                font-weight: 900;
                line-height: 1.1;
                white-space: nowrap;
                cursor: pointer;
                padding: 0.62rem 0.75rem;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                transition: all 0.18s ease;
            }

            .sticky-mode-btn:hover {
                background: #ffffff;
                border-color: #9fb7c8;
            }

            .sticky-mode-btn.active {
                background: #2c7a47;
                border-color: #226239;
                color: #ffffff;
                box-shadow: 0 10px 20px -16px rgba(44, 122, 71, 0.95);
            }

            .sticky-mode-btn.test-active {
                background: #2c5f8a;
                border-color: #1e405b;
                color: #ffffff;
                box-shadow: 0 10px 20px -16px rgba(44, 95, 138, 0.85);
            }
        }

        /* Desktop: единая адаптация страницы под высоту экрана.
           Пропорции подложки и расстояния между элементами не меняются.
           Прокрутка сохранена: страница не блокируется через overflow: hidden. */
        @media (min-width: 1001px) {
            html,
            body {
                min-height: 100%;
                height: auto;
                overflow-x: hidden;
                overflow-y: auto;
            }

            body {
                min-height: 100vh;
            }

            .page-shell {
                --desktop-page-scale: 1;
                transform: none;
                transform-origin: top center;
                zoom: var(--desktop-page-scale);
            }

            .main-card {
                min-height: calc(100vh - 3rem);
            }
        }

        @media (min-width: 1001px) and (max-height: 880px) {
            .page-shell {
                --desktop-page-scale: 0.94;
            }
        }

        @media (min-width: 1001px) and (max-height: 820px) {
            .page-shell {
                --desktop-page-scale: 0.88;
            }
        }

        @media (min-width: 1001px) and (max-height: 760px) {
            .page-shell {
                --desktop-page-scale: 0.82;
            }
        }

        @media (min-width: 1001px) and (max-height: 700px) {
            .page-shell {
                --desktop-page-scale: 0.76;
            }
        }

        @media (max-width: 1000px) {
            body {
                padding: 0.6rem 1.4rem 0.6rem;
            }

            .mobile-games-view-toolbar {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                margin: -0.35rem 0 0.75rem;
            }

            .games-carousel-dots.visible {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.45rem;
                margin: 0.95rem 0 0.25rem;
            }

            .games-grid.carousel-active {
                touch-action: pan-y;
            }

            .games-grid.carousel-active.carousel-animate-next .game-card {
                animation: gamesCarouselInNext 0.34s cubic-bezier(0.2, 0.9, 0.35, 1) both;
            }

            .games-grid.carousel-active.carousel-animate-prev .game-card {
                animation: gamesCarouselInPrev 0.34s cubic-bezier(0.2, 0.9, 0.35, 1) both;
            }

            .games-grid.carousel-active.carousel-animate-fade .game-card {
                animation: gamesCarouselFadeIn 0.28s ease both;
            }

            .games-grid.carousel-active .game-card:nth-child(2) {
                animation-delay: 0.035s;
            }

            .games-grid.carousel-active .game-card:nth-child(3) {
                animation-delay: 0.07s;
            }

            @keyframes gamesCarouselInNext {
                from {
                    opacity: 0;
                    transform: translateX(24px) scale(0.985);
                }

                to {
                    opacity: 1;
                    transform: translateX(0) scale(1);
                }
            }

            @keyframes gamesCarouselInPrev {
                from {
                    opacity: 0;
                    transform: translateX(-24px) scale(0.985);

<div class="sticky-mode-switch" id="stickyModeSwitch" aria-hidden="true">

<script>
    if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
    }

    function forcePageTop() {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
    }

    forcePageTop();

    document.addEventListener('DOMContentLoaded', () => {
        forcePageTop();
        requestAnimationFrame(forcePageTop);
    });

    window.addEventListener('pageshow', () => {
        forcePageTop();
        requestAnimationFrame(forcePageTop);
        setTimeout(forcePageTop, 50);
    });

    window.addEventListener('load', () => {
        forcePageTop();
        requestAnimationFrame(forcePageTop);
        setTimeout(forcePageTop, 50);
        setTimeout(forcePageTop, 180);
    });

    (function createParticles() {
        const count = 45;

        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');

            const size = Math.random() * 7 + 2;

            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 10 + 7 + 's';
            p.style.animationDelay = Math.random() * -25 + 's';
            p.style.opacity = Math.random() * 0.3 + 0.08;

            document.body.appendChild(p);
        }
    })();
</script>

<script>
    localStorage.removeItem('globalBrushColor');
    localStorage.removeItem('globalBrushPosIndex');

    let lastTestGame = localStorage.getItem('lastTestGame');
    let currentMode = "train";

    const modeDescription = document.getElementById('modeDescription');
    const stickyModeSwitch = document.getElementById('stickyModeSwitch');
    const stickyTrainModeBtn = document.getElementById('stickyTrainModeBtn');
    const stickyTestModeBtn = document.getElementById('stickyTestModeBtn');
    const modePanel = document.querySelector('.mode-panel');
    const gamesGrid = document.getElementById('gamesGrid');
    const gamesViewToolbar = document.getElementById('mobileGamesViewToolbar');
    const gamesViewToggleBtn = document.getElementById('gamesViewToggleBtn');
    const gamesViewToggleIcon = document.getElementById('gamesViewToggleIcon');
    const gamesViewToggleText = document.getElementById('gamesViewToggleText');
    const gamesCarouselDots = document.getElementById('gamesCarouselDots');

    let gamesViewMode = localStorage.getItem('gamesViewMode') === 'carousel'
        ? 'carousel'
        : 'list';

    let gamesCarouselPage = 0;
    let gamesCarouselAnimationDirection = 0;

    function clearAllTestSettings() {
        for (let i = localStorage.length - 1; i >= 0; i--) {
            const key = localStorage.key(i);

            if (key && key.startsWith('testSetup_')) {
                localStorage.removeItem(key);
            }
        }

        localStorage.removeItem('mixedTestSetup');
    }

    document.getElementById('backButton').addEventListener('click', () => {
        if (currentMode === 'train') {
            window.location.href = 'welcome.html?mode=train';
        } else {
            window.location.href = 'welcome.html?mode=test';
        }
    });

    const games = [
        {
            name: "Алькерк",
            id: "alquerque",
            desc: "Древние шашки, рубка прыжком. Поле 5×5 с пересечениями.",
            available: true,
            image: "img/alk.png",
            bgClass: "game-bg-alquerque"
        },
        {
            name: "Суракарта",
            id: "surakarta",
            desc: "Круглая доска, захват через дугу. Змеиная механика.",
            available: true,
            image: "img/sura.png",
            bgClass: "game-bg-surakarta"
        },
        {
            name: "Фанорона",
            id: "fanorona",
            desc: "Тактическая игра на гексах с захватом линий.",
            available: true,
            image: "img/fan.png",
            bgClass: "game-bg-fanorona"
        },
        {
            name: "Даблот",
            id: "dablot",
            desc: "Прыжки через свои фишки, цель — собрать все в центре.",
            available: false,
            image: "img/dabl.png",
            bgClass: "game-bg-dablot"
        },
        {
            name: "Хнефатафл",
            id: "hnefatafl",
            desc: "Скандинавские тафлы: побег короля.",
            available: true,
            image: "img/hnef.png",
            bgClass: "game-bg-hnefatafl"
        },
        {
            name: "Сиджа (7x7)",
            id: "sidja",
            desc: "Львы против собак, захват окружением.",
            available: true,
            image: "img/sig.png",
            bgClass: "game-bg-sidja"
        },
        {
            name: "Реверси",
            id: "reversi",
            desc: "Классические перевороты фишек.",
            available: true,
            image: "img/rev.png",
            bgClass: "game-bg-reversi"
        },
        {
            name: "Столбовые шашки",
            id: "stolbovye",
            desc: "Русские шашки на колоннах.",
            available: false,
            image: "img/shash.png",
            bgClass: "game-bg-stolbovye"
        },
        {
            name: "🎲 Сборный тест",
            id: "mixed",
            desc: "Задачи из разных игр в случайном порядке.",
            available: true,
            image: "logo/logo.svg",
            bgClass: "game-bg-mixed"
        }
    ];

    function updateModeDescription() {
        if (currentMode === 'train') {
            modeDescription.innerHTML = '🧠 Решайте задачи в своём темпе и тренируйте навыки';
        } else {
            modeDescription.innerHTML = '📋 Настраивайте тестирование под себя и проверьте знания';
        }
    }

    function showInfoMessage(msg) {
        const msgDiv = document.getElementById('infoMessage');

        msgDiv.textContent = msg;
        msgDiv.style.display = 'block';

        setTimeout(() => {
            msgDiv.style.display = 'none';
        }, 3000);
    }

    function isTabletOrMobileMode() {
        return window.matchMedia && window.matchMedia('(max-width: 1000px)').matches;
    }

    function getCurrentModeGames() {
        return currentMode === 'train'
            ? games.filter(game => game.id !== 'mixed')
            : games;
    }

    function getGamesCarouselPageCount(totalGames) {
        return Math.max(1, Math.ceil(totalGames / 3));
    }

    function getDisplayedGamesForCurrentView(allGames) {
        if (!isTabletOrMobileMode() || gamesViewMode !== 'carousel') {
            return allGames;
        }

        const pageCount = getGamesCarouselPageCount(allGames.length);
        gamesCarouselPage = Math.max(0, Math.min(gamesCarouselPage, pageCount - 1));

        const start = gamesCarouselPage * 3;
        return allGames.slice(start, start + 3);
    }

    function updateGamesViewControls(totalGames) {
        const isSmallScreen = isTabletOrMobileMode();
        const isCarousel = gamesViewMode === 'carousel';
        const pageCount = getGamesCarouselPageCount(totalGames);

        document.body.classList.toggle('games-carousel-mode', isSmallScreen && isCarousel);

        if (gamesViewToolbar) {
            gamesViewToolbar.style.display = isSmallScreen ? 'flex' : 'none';
        }

        if (gamesViewToggleBtn) {
            gamesViewToggleBtn.classList.toggle('active', isSmallScreen && isCarousel);
            gamesViewToggleBtn.setAttribute('aria-pressed', isCarousel ? 'true' : 'false');
        }

        if (gamesViewToggleIcon) {
            gamesViewToggleIcon.textContent = isCarousel ? '☰' : '▦';
        }

        if (gamesViewToggleText) {
            gamesViewToggleText.textContent = isCarousel ? 'Список' : 'Карусель';
        }

        if (gamesViewToggleBtn) {
            gamesViewToggleBtn.setAttribute('aria-label', isCarousel ? 'Показать списком' : 'Показать каруселью');
            gamesViewToggleBtn.title = isCarousel ? 'Показать списком' : 'Показать каруселью';
        }

        if (!gamesCarouselDots) return;

        if (!isSmallScreen || !isCarousel || pageCount <= 1) {
            gamesCarouselDots.classList.remove('visible');
            gamesCarouselDots.innerHTML = '';
            return;
        }

        gamesCarouselDots.classList.add('visible');
        gamesCarouselDots.innerHTML = Array.from({ length: pageCount }, (_, index) => {
            const activeClass = index === gamesCarouselPage ? ' active' : '';
            return `<button class="games-carousel-dot${activeClass}" type="button" data-carousel-page="${index}" aria-label="Страница ${index + 1}"></button>`;
        }).join('');
    }

    function goToGamesCarouselPage(page) {
        const totalGames = getCurrentModeGames().length;
        const pageCount = getGamesCarouselPageCount(totalGames);
        const targetPage = Math.max(0, Math.min(page, pageCount - 1));

        if (targetPage === gamesCarouselPage) return;

        gamesCarouselAnimationDirection = targetPage > gamesCarouselPage ? 1 : -1;
        gamesCarouselPage = targetPage;
        renderGames();
    }

    function moveGamesCarouselPage(direction) {
        const totalGames = getCurrentModeGames().length;
        const pageCount = getGamesCarouselPageCount(totalGames);

        if (pageCount <= 1) return;

        const nextPage = Math.max(0, Math.min(gamesCarouselPage + direction, pageCount - 1));

        if (nextPage !== gamesCarouselPage) {
            gamesCarouselAnimationDirection = direction > 0 ? 1 : -1;
            gamesCarouselPage = nextPage;
            renderGames();
        }
    }

    function setGamesViewMode(mode) {
        gamesViewMode = mode === 'carousel' ? 'carousel' : 'list';
        localStorage.setItem('gamesViewMode', gamesViewMode);
        gamesCarouselPage = 0;
        gamesCarouselAnimationDirection = gamesViewMode === 'carousel' ? 2 : 0;
        renderGames();
    }

    function renderGames() {
        const grid = gamesGrid || document.getElementById('gamesGrid');
        if (!grid) return;

        grid.innerHTML = '';

        const allGames = getCurrentModeGames();
        const displayedGames = getDisplayedGamesForCurrentView(allGames);
        const isCarousel = isTabletOrMobileMode() && gamesViewMode === 'carousel';

        grid.classList.toggle('carousel-active', isCarousel);
        grid.classList.remove('carousel-animate-next', 'carousel-animate-prev', 'carousel-animate-fade');

        if (isCarousel && gamesCarouselAnimationDirection) {
            const animationClass = gamesCarouselAnimationDirection > 1
                ? 'carousel-animate-fade'
                : gamesCarouselAnimationDirection > 0
                    ? 'carousel-animate-next'
                    : 'carousel-animate-prev';

            grid.classList.add(animationClass);

            window.setTimeout(() => {
                grid.classList.remove('carousel-animate-next', 'carousel-animate-prev', 'carousel-animate-fade');
            }, 430);

            gamesCarouselAnimationDirection = 0;
        }

        displayedGames.forEach(game => {
            const card = document.createElement('div');
            card.className = game.available ? 'game-card' : 'game-card unavailable';

            if (game.image) {
                card.classList.add('has-image');
                card.style.setProperty('--game-bg-image', `url("${game.image}")`);
            }

            if (game.bgClass) {
                card.classList.add(game.bgClass);
            }

            const badgeClass = game.available ? 'game-badge' : 'game-badge unavailable';
            const badgeText = game.available ? 'Доступно' : 'Скоро';
            const actionText = game.available
                ? (currentMode === 'train' ? 'Перейти к тренировке →' : 'Настроить тест →')
                : 'В разработке';

            card.innerHTML = `
                <div class="game-top">
                    <div class="game-title">${game.name}</div>
                    <div class="${badgeClass}">${badgeText}</div>
                </div>

                <div class="game-desc">${game.desc}</div>

                <div class="game-action">${actionText}</div>
            `;

            card.addEventListener('click', (e) => {
                e.stopPropagation();

                if (!game.available) {
                    showInfoMessage(`Игра «${game.name}» пока в разработке. Следите за обновлениями!`);
                    return;
                }

                if (currentMode === 'train') {
                    window.location.href = `game.html?game=${game.id}`;
                } else {
                    if (lastTestGame === game.id) {
                        window.location.href = `test_setup.html?game=${game.id}`;
                    } else {
                        localStorage.setItem('lastTestGame', game.id);
                        window.location.href = `test_setup.html?game=${game.id}&reset=1`;
                    }
                }
            });

            grid.appendChild(card);
        });

        updateGamesViewControls(allGames.length);
    }


    function syncStickyModeButtons() {
        if (!stickyTrainModeBtn || !stickyTestModeBtn) return;

        if (currentMode === 'train') {
            stickyTrainModeBtn.classList.add('active');
            stickyTrainModeBtn.classList.remove('test-active');

            stickyTestModeBtn.classList.remove('active');
            stickyTestModeBtn.classList.remove('test-active');
        } else {
            stickyTrainModeBtn.classList.remove('active');
            stickyTrainModeBtn.classList.remove('test-active');

            stickyTestModeBtn.classList.add('active');
            stickyTestModeBtn.classList.add('test-active');
        }
    }

    function updateStickyModeVisibility() {
        if (!stickyModeSwitch || !modePanel) return;

        if (!isTabletOrMobileMode()) {
            stickyModeSwitch.classList.remove('visible');
            stickyModeSwitch.setAttribute('aria-hidden', 'true');
            return;
        }

        const panelRect = modePanel.getBoundingClientRect();
        const shouldShow = panelRect.bottom <= 0;

        stickyModeSwitch.classList.toggle('visible', shouldShow);
        stickyModeSwitch.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
    }

    function setBodyMode(mode) {
        const body = document.body;

        if (mode === 'train') {
            body.classList.remove('mode-test');
            body.classList.add('mode-train');
        } else {
            body.classList.remove('mode-train');
            body.classList.add('mode-test');
        }

        updateModeDescription();
    }

    function saveCurrentModeToUrl(mode) {
        const newUrl = `${window.location.pathname}?mode=${mode}`;
        window.history.replaceState(null, '', newUrl);
    }

    function setActiveMode(mode, showMessage = true) {
        const trainBtn = document.getElementById('trainModeBtn');
        const testBtn = document.getElementById('testModeBtn');

        currentMode = mode;

        localStorage.setItem('gameSelectMode', mode);
        saveCurrentModeToUrl(mode);
        gamesCarouselPage = 0;

        if (mode === 'train') {
            trainBtn.classList.add('active');
            trainBtn.classList.remove('test-active');

            testBtn.classList.remove('active');
            testBtn.classList.remove('test-active');

            if (showMessage) {
                showInfoMessage('Вы переключились в РЕЖИМ ТРЕНИРОВКИ');
            }

            setBodyMode('train');
            clearAllTestSettings();
            localStorage.removeItem('lastTestGame');
            lastTestGame = null;

            renderGames();
        } else {
            trainBtn.classList.remove('active');
            trainBtn.classList.remove('test-active');

            testBtn.classList.add('active');
            testBtn.classList.add('test-active');

            if (showMessage) {
                showInfoMessage('Вы переключились в РЕЖИМ ТЕСТИРОВАНИЯ');
            }

            localStorage.removeItem('globalBrushColor');
            localStorage.removeItem('globalBrushPosIndex');

            setBodyMode('test');
            renderGames();
        }

        syncStickyModeButtons();
        requestAnimationFrame(updateStickyModeVisibility);
    }

    document.getElementById('trainModeBtn').addEventListener('click', () => {
        setActiveMode('train', true);
    });

    document.getElementById('testModeBtn').addEventListener('click', () => {
        setActiveMode('test', true);
    });

    if (stickyTrainModeBtn) {
        stickyTrainModeBtn.addEventListener('click', () => {
            setActiveMode('train', true);
        });
    }

    if (stickyTestModeBtn) {
        stickyTestModeBtn.addEventListener('click', () => {
            setActiveMode('test', true);
        });
    }

    if (gamesViewToggleBtn) {
        gamesViewToggleBtn.addEventListener('click', () => {
            setGamesViewMode(gamesViewMode === 'carousel' ? 'list' : 'carousel');
        });
    }

    if (gamesCarouselDots) {
        gamesCarouselDots.addEventListener('click', (event) => {
            const dot = event.target.closest('[data-carousel-page]');

            if (!dot) return;

            goToGamesCarouselPage(Number(dot.dataset.carouselPage || 0));
        });
    }

    let gamesTouchStartX = 0;
    let gamesTouchStartY = 0;

    if (gamesGrid) {
        gamesGrid.addEventListener('touchstart', (event) => {
            if (!isTabletOrMobileMode() || gamesViewMode !== 'carousel') return;

            const touch = event.touches[0];
            gamesTouchStartX = touch.clientX;
            gamesTouchStartY = touch.clientY;
        }, { passive: true });

        gamesGrid.addEventListener('touchend', (event) => {
            if (!isTabletOrMobileMode() || gamesViewMode !== 'carousel') return;
            if (!event.changedTouches || !event.changedTouches.length) return;

            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - gamesTouchStartX;
            const deltaY = touch.clientY - gamesTouchStartY;

            if (Math.abs(deltaX) < 48 || Math.abs(deltaX) <= Math.abs(deltaY)) return;

            if (deltaX < 0) {
                moveGamesCarouselPage(1);
            } else {
                moveGamesCarouselPage(-1);
            }
        }, { passive: true });
    }

    window.addEventListener('scroll', updateStickyModeVisibility, { passive: true });
    window.addEventListener('resize', () => {
        updateStickyModeVisibility();
        renderGames();
    });
    window.addEventListener('load', () => {
        updateStickyModeVisibility();
        renderGames();
    });

    const urlParams = new URLSearchParams(window.location.search);
    const modeParam = urlParams.get('mode');
    const savedPageMode = localStorage.getItem('gameSelectMode');
    const savedMode = localStorage.getItem('lastMode');

    if (savedPageMode === 'train' || savedPageMode === 'test') {
        setActiveMode(savedPageMode, false);
    } else if (modeParam === 'train' || modeParam === 'test') {
        setActiveMode(modeParam, false);
    } else if (savedMode === 'train' || savedMode === 'test') {
        setActiveMode(savedMode, false);
        localStorage.removeItem('lastMode');
    } else {
        setActiveMode('train', false);
    }

    renderGames();
    updateModeDescription();
    syncStickyModeButtons();
    requestAnimationFrame(updateStickyModeVisibility);
</script>

</body>
</html>
