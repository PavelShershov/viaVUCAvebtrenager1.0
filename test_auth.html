<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Авторизация · viaVuca</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 34%),
                radial-gradient(circle at bottom right, rgba(125, 158, 190, 0.24), transparent 38%),
                linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            color: #1e2b3c;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            box-shadow: 0 24px 55px -22px rgba(18, 40, 60, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 2rem;
            text-align: center;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.05) forwards;
            opacity: 0;
            transform: translateY(18px);
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 150px;
            max-width: 70%;
            height: auto;
            display: block;
            margin: 0 auto 0.8rem;
        }

        .sub {
            color: #5a6e7c;
            margin-bottom: 1.5rem;
            font-size: 0.98rem;
            font-weight: 600;
            line-height: 1.4;
        }

        input {
            width: 100%;
            padding: 0.82rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid #d9e5ee;
            border-radius: 1rem;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.9);
            color: #1a3b4f;
            box-shadow:
                0 8px 20px -18px rgba(18, 40, 60, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.92);
            outline: none;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #8ba0b5;
            font-weight: 400;
        }

        input:focus {
            border-color: #9fb7c8;
            box-shadow:
                0 0 0 3px rgba(44, 95, 138, 0.16),
                0 8px 20px -18px rgba(18, 40, 60, 0.45);
            background: #ffffff;
        }

        button {
            background: #2c7a47;
            border: none;
            padding: 0.78rem 1.45rem;
            border-radius: 999px;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            width: auto;
            min-width: 145px;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.65);
        }

        button:hover:not(:disabled) {
            background: #1f5f36;
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 14px 26px -18px rgba(18, 40, 60, 0.8);
        }

        button:disabled {
            background: #9bb59b;
            cursor: not-allowed;
            opacity: 0.75;
            transform: none;
        }

        .error {
            color: #d92d20;
            margin-top: 0.8rem;
            font-size: 0.86rem;
            font-weight: 700;
            line-height: 1.35;
            min-height: 1.2rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #5a6e7c;
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #1e4663;
            text-decoration: underline;
        }

        .loader {
            display: inline-block;
            width: 17px;
            height: 17px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.6rem 1.2rem;
                border-radius: 1.6rem;
            }

            .logo {
                width: 135px;
            }

            button {
                width: auto;
                min-width: 135px;
                padding: 0.72rem 1.25rem;
                font-size: 0.95rem;
            }
        }
    </style>

    <script src="js/cloud.js"></script>
</head>

<body>
<div class="auth-card">
    <img src="logo/logo.svg" alt="viaVuca" class="logo">

    <div class="sub">Введите ваши данные для прохождения теста</div>

    <input type="text" id="studentName" placeholder="Имя" autocomplete="name">
    <input type="email" id="studentEmail" placeholder="Email (для отправки результатов)" autocomplete="email">

    <button id="startTestBtn">Начать тест</button>

    <div id="errorMsg" class="error"></div>

    <a href="enter_test.html" class="back-link">← Назад</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('testId');

    if (!testId) {
        document.getElementById('errorMsg').innerText = 'Неверная ссылка. Обратитесь к организатору.';
        document.getElementById('startTestBtn').disabled = true;
    }

    document.getElementById('startTestBtn').addEventListener('click', async () => {
        const name = document.getElementById('studentName').value.trim();
        const email = document.getElementById('studentEmail').value.trim();

        if (!name || !email) {
            document.getElementById('errorMsg').innerText = 'Заполните все поля';
            return;
        }

        const btn = document.getElementById('startTestBtn');
        const originalText = btn.innerText;

        btn.innerHTML = '<span class="loader"></span> Загрузка...';
        btn.disabled = true;

        try {
            const studentId = 'student_' + Math.random().toString(36).substr(2, 8);

            await registerStudent(testId, studentId, name, email);

            sessionStorage.setItem('testId', testId);
            sessionStorage.setItem('studentId', studentId);
            sessionStorage.setItem('studentName', name);

            window.location.href = `turnir.html?testId=${testId}&studentId=${studentId}`;
        } catch (error) {
            document.getElementById('errorMsg').innerText = error.message || 'Ошибка регистрации. Попробуйте ещё раз.';
            btn.innerHTML = originalText;
            btn.disabled = false;
            console.error(error);
        }
    });

    document.getElementById('studentName').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('startTestBtn').click();
    });

    document.getElementById('studentEmail').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('startTestBtn').click();
    });
</script>
</body>
</html>
