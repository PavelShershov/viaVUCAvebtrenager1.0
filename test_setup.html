<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>viaVuca · Настройка теста</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 34%),
                radial-gradient(circle at bottom right, rgba(125, 158, 190, 0.24), transparent 38%),
                linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            color: #1e2b3c;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .setup-card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            box-shadow: 0 24px 55px -22px rgba(18, 40, 60, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 2rem 1.8rem;
            transition: transform 0.2s ease;
            position: relative;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.05) forwards;
            opacity: 0;
            transform: translateY(18px);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: #1a3b4f;
            border: 1px solid #cbdbe2;
            transition: 0.2s ease;
            z-index: 100;
            box-shadow: 0 8px 18px -16px rgba(18, 40, 60, 0.5);
        }

        .back-button:hover {
            background: #ffffff;
            transform: translateX(-2px);
            border-color: #9fb7c8;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.65);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.045em;
            background: linear-gradient(135deg, #172637, #2a4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
            line-height: 1.08;
        }

        .sub {
            text-align: center;
            color: #5a6e7c;
            font-weight: 800;
            font-size: 0.78rem;
            letter-spacing: 1.15px;
            text-transform: uppercase;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #dce5ef;
            display: inline-block;
            width: auto;
            padding-bottom: 0.4rem;
            margin-left: auto;
            margin-right: auto;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            color: #5a6e7c;
            font-weight: 700;
        }

        .option-card {
            background: linear-gradient(155deg, rgba(238, 246, 252, 0.96), rgba(255, 255, 255, 0.9));
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.2rem;
            border: 1px solid #d9e5ee;
            transition: all 0.2s ease;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow:
                0 12px 24px -22px rgba(18, 40, 60, 0.52),
                inset 0 1px 0 rgba(255, 255, 255, 0.96);
        }

        .option-card:hover {
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.98), rgba(244, 249, 253, 0.96));
            border-color: #9fb7c8;
            transform: translateY(-1px);
            box-shadow:
                0 18px 30px -24px rgba(18, 40, 60, 0.68),
                inset 0 1px 0 rgba(255, 255, 255, 0.98);
        }

        .option-left {
            flex: 2;
            min-width: 0;
        }

        .option-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1a3b4f;
            margin-bottom: 0.3rem;
            line-height: 1.18;
        }

        .option-desc {
            font-size: 0.85rem;
            color: #5a6e7c;
            font-weight: 600;
            line-height: 1.35;
        }

        .option-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.7rem;
            font-weight: 900;
            color: #8ba0b5;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            text-align: right;
        }

        .styled-select {
            background:
                rgba(255, 255, 255, 0.9)
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%234b6a8b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 0.6rem center;
            background-size: 0.8rem;
            padding: 0.5rem 1.8rem 0.5rem 0.8rem;
            border-radius: 1.15rem;
            font-weight: 800;
            font-size: 0.85rem;
            color: #1a3b4f;
            border: 1px solid #d9e5ee;
            border-left: 4px solid #e67e22;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            font-family: inherit;
            width: auto;
            min-width: 160px;
            box-shadow: 0 8px 20px -18px rgba(18, 40, 60, 0.45);
            transition: all 0.2s ease;
        }

        .styled-select:hover {
            background-color: #ffffff;
            border-color: #9fb7c8;
            border-left-color: #e67e22;
        }

        .styled-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.16);
        }

        .count-select {
            width: 80px;
            min-width: 80px;
            max-width: 80px;
            flex: none;
            text-align: left;
            padding-left: 0.8rem;
            padding-right: 1.8rem;
        }

        .type-controls-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.2rem;
        }

        .type-controls-row .styled-select:not(.count-select) {
            min-width: 210px;
            max-width: 320px;
        }

        .type-controls-row .count-select {
            width: 80px;
            min-width: 80px;
            max-width: 80px;
            flex: 0 0 80px;
        }

        .play-btn,
        .custom-generate-btn {
            border: none;
            font-family: inherit;
            font-weight: 800;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 12px 22px -16px rgba(18, 40, 60, 0.65);
        }

        .play-btn {
            background: #2c7a47;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            gap: 0.4rem;
        }

        .play-btn:hover {
            background: #1f5f36;
            transform: scale(0.97);
            box-shadow: 0 14px 26px -18px rgba(18, 40, 60, 0.8);
        }

        .custom-generate-btn {
            background: #2c7a47;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-size: 0.95rem;
            white-space: pre-line;
            line-height: 1.3;
            min-width: 180px;
        }

        .custom-generate-btn:hover {
            background: #1f5f36;
            transform: scale(0.98);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 32%),
                rgba(10, 18, 28, 0.78);
            backdrop-filter: blur(7px);
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.74);
            box-shadow: 0 28px 70px -30px rgba(0, 0, 0, 0.75);
            animation: modalIn 0.2s ease forwards;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            color: #607584;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(244, 249, 255, 0.85);
            border: 1px solid #d9e5ee;
        }

        .close-modal:hover {
            color: #1e4663;
            background: #ffffff;
            transform: scale(1.04);
        }

        .modal h3 {
            margin-bottom: 1rem;
            color: #1a3b4f;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid #e0eaf4;
        }

        .task-name {
            flex: 2;
            font-weight: 700;
            color: #2c3e4e;
            line-height: 1.35;
        }

        .task-counter {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(244, 249, 255, 0.92);
            padding: 0.3rem 0.8rem;
            border-radius: 3rem;
            border: 1px solid #d9e5ee;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }

        .counter-btn {
            background: #ffffff;
            border: 1px solid #d9e5ee;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            color: #1e4663;
            transition: all 0.14s ease;
            padding: 0;
            margin: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px -14px rgba(18, 40, 60, 0.75);
        }

        .counter-btn:hover {
            background: #eef6ff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
        }

        .counter-input {
            width: 45px;
            text-align: center;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            background: transparent;
            font-family: inherit;
            color: #1a3b4f;
            outline: none;
        }

        .modal-actions {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .modal-toast,
        .mixed-toast {
            background: rgba(30, 43, 60, 0.92);
            backdrop-filter: blur(10px);
            color: #ffffff;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 12px 24px -18px rgba(18, 40, 60, 0.75);
        }

        .modal-toast.show,
        .mixed-toast.show {
            opacity: 1;
        }

        .bottom-links,
        .mixed-bottom-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            padding: 0.5rem 0;
            border-top: 1px solid #e0eaf4;
            font-size: 0.85rem;
        }

        .clickable-link {
            cursor: pointer;
            text-decoration: none;
            color: #5a6e7c;
            font-weight: 800;
            transition: color 0.2s ease;
        }

        .clickable-link:hover {
            color: #1e4663;
            text-decoration: underline;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #5a6e7c;
            font-weight: 800;
            user-select: none;
        }

        .checkbox-label:hover {
            color: #1e4663;
        }

        .checkbox-label input {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: #2c5f8a;
        }

        .game-block {
            background: linear-gradient(155deg, rgba(238, 246, 252, 0.96), rgba(255, 255, 255, 0.9));
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid #d9e5ee;
            transition: all 0.2s ease;
            box-shadow:
                0 12px 24px -22px rgba(18, 40, 60, 0.52),
                inset 0 1px 0 rgba(255, 255, 255, 0.96);
        }

        .game-block:hover {
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.98), rgba(244, 249, 253, 0.96));
            border-color: #9fb7c8;
            transform: translateY(-1px);
            box-shadow:
                0 18px 30px -24px rgba(18, 40, 60, 0.68),
                inset 0 1px 0 rgba(255, 255, 255, 0.98);
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .game-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #2c5f8a;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1a3b4f;
            margin: 0;
            cursor: pointer;
        }

        .task-list-mixed {
            margin-top: 0.8rem;
            padding-left: 1.5rem;
            border-left: 2px solid #dce5ef;
        }

        .task-row-mixed {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid #e0eaf4;
        }

        .task-name-mixed {
            flex: 2;
            font-weight: 700;
            color: #2c3e4e;
            line-height: 1.35;
        }

        .task-counter-mixed {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(244, 249, 255, 0.92);
            padding: 0.2rem 0.6rem;
            border-radius: 3rem;
            border: 1px solid #d9e5ee;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
        }

        .counter-btn-mixed {
            background: #ffffff;
            border: 1px solid #d9e5ee;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            color: #1e4663;
            transition: all 0.14s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px -14px rgba(18, 40, 60, 0.75);
        }

        .counter-btn-mixed:hover {
            background: #eef6ff;
            border-color: #9fb7c8;
            transform: translateY(-1px);
        }

        .counter-input-mixed {
            width: 45px;
            text-align: center;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            background: transparent;
            font-family: inherit;
            color: #1a3b4f;
            outline: none;
        }

        .mixed-toast {
            margin-top: 0.5rem;
        }

        .selected-games-info {
            text-align: center;
            font-size: 0.85rem;
            color: #5a6e7c;
            margin-top: 0.8rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .game-error {
            color: #d92d20;
            font-size: 0.8rem;
            margin-left: 1rem;
            font-weight: 800;
        }

        @media (max-width: 700px) {
            .option-card {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
            }

            .option-controls {
                align-items: stretch;
            }

            .styled-select {
                width: 100%;
            }

            .count-select {
                width: 80px;
                min-width: 80px;
                max-width: 80px;
                flex: 0 0 80px;
            }

            .type-controls-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .type-controls-row .styled-select:not(.count-select) {
                width: 100%;
                max-width: none;
            }

            .type-controls-row .count-select {
                width: 80px;
                min-width: 80px;
                max-width: 80px;
                flex: 0 0 80px;
            }

            .play-btn {
                justify-content: center;
            }

            .back-button {
                top: 12px;
                left: 12px;
                padding: 8px 12px;
            }

            .back-button span {
                display: none;
            }

            .back-button svg {
                width: 20px;
                height: 20px;
            }

            .game-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-row,
            .task-row-mixed {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.55rem;
            }

            .task-counter,
            .task-counter-mixed {
                align-self: flex-start;
            }
        }
    </style>
</head>

<body>
<div class="setup-card" id="setupCard">
    <div class="back-button" id="backButton">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span>Назад</span>
    </div>
    <div class="loader">Загрузка...</div>
</div>

<div id="customModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>⚙️ Индивидуальный вариант</h3>
        <div id="customTaskList"></div>

        <div class="bottom-links">
            <label class="checkbox-label">
                <input type="checkbox" id="shuffleCheckbox"> В случайном порядке
            </label>
            <span id="clearAllBtn" class="clickable-link">✗ Убрать все</span>
        </div>

        <div class="modal-actions">
            <div id="modalToast" class="modal-toast"></div>
            <button id="generateCustomBtn" class="custom-generate-btn">Сгенерировать тест</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);

    /*
       ВАЖНО:
       Здесь больше НЕТ автоматического переброса на index.html или welcome.html.
       Если параметр ?game=... не передан, берём последнюю выбранную игру.
       Если её тоже нет, используем alquerque.
    */
    const gameId = urlParams.get('game') || localStorage.getItem('lastTestGame') || 'alquerque';
    const resetParam = urlParams.get('reset') === '1';

    localStorage.setItem('lastTestGame', gameId);

    function goTo(url) {
        window.location.assign(url);
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = () => reject(new Error(`Не удалось загрузить ${src}`));
            document.head.appendChild(script);
        });
    }

    async function loadGameConfig(gid) {
        try {
            const res = await fetch(`games/${gid}/config.json`);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) {
            return null;
        }
    }

    function showModalToast(message, toastId = 'modalToast') {
        const toast = document.getElementById(toastId);
        if (!toast) return;

        toast.textContent = message;
        toast.classList.add('show');

        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    if (gameId !== 'mixed') {
        let gameConfig = null;
        let taskTitles = {};
        let taskGenerators = {};
        const STORAGE_KEY = `testSetup_${gameId}`;

        if (resetParam) {
            localStorage.removeItem(STORAGE_KEY);
            window._customCounts = null;
            window._savedCustomCounts = null;
            window._savedCustomShuffle = null;
        }

        function loadSavedSettings() {
            const saved = localStorage.getItem(STORAGE_KEY);

            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) {
                    return null;
                }
            }

            return null;
        }

        function saveSettings(settings) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }

        function applySavedSettings(settings) {
            if (!settings) return;

            if (settings.randomCount) {
                const rs = document.getElementById('randomCountSelect');
                if (rs && rs.querySelector(`option[value="${settings.randomCount}"]`)) rs.value = settings.randomCount;
            }

            if (settings.typeType) {
                const ts = document.getElementById('taskTypeSelect');
                if (ts && ts.querySelector(`option[value="${settings.typeType}"]`)) ts.value = settings.typeType;
            }

            if (settings.typeCount) {
                const cs = document.getElementById('typeCountSelect');
                if (cs && cs.querySelector(`option[value="${settings.typeCount}"]`)) cs.value = settings.typeCount;
            }

            if (settings.customCounts) window._savedCustomCounts = settings.customCounts;
            if (settings.customShuffle !== undefined) window._savedCustomShuffle = settings.customShuffle;
        }

        function saveCurrentSettings() {
            const randomSelect = document.getElementById('randomCountSelect');
            const typeSelect = document.getElementById('taskTypeSelect');
            const typeCountSelect = document.getElementById('typeCountSelect');

            const settings = {
                randomCount: randomSelect ? randomSelect.value : null,
                typeType: typeSelect ? typeSelect.value : null,
                typeCount: typeCountSelect ? typeCountSelect.value : null,
            };

            if (window._customCounts) settings.customCounts = window._customCounts;

            const shuffleCheckbox = document.getElementById('shuffleCheckbox');
            if (shuffleCheckbox) settings.customShuffle = shuffleCheckbox.checked;

            saveSettings(settings);
        }

            await Promise.allSettled(loadPromises);

            if (window.taskTitles && typeof window.taskTitles === 'object') {
                taskTitles = { ...window.taskTitles };

                taskTitles = {};

        function setupHoldCounter(btn, delta, numInput, changeCallback) {
            let timeoutId = null;
            let intervalId = null;

            const startHold = (e) => {
                e.preventDefault();
                e.stopPropagation();

                if (timeoutId) clearTimeout(timeoutId);
                if (intervalId) clearInterval(intervalId);

                changeCallback(delta);

                timeoutId = setTimeout(() => {
                    intervalId = setInterval(() => changeCallback(delta), 200);
                }, 700);
            };

            const stopHold = () => {
                if (timeoutId) clearTimeout(timeoutId);
                if (intervalId) clearInterval(intervalId);
            };

            btn.addEventListener('mousedown', startHold);
            btn.addEventListener('mouseup', stopHold);
            btn.addEventListener('mouseleave', stopHold);
            btn.addEventListener('touchstart', startHold, { passive: false });
            btn.addEventListener('touchend', stopHold);
            btn.addEventListener('touchcancel', stopHold);
        }

        function renderCustomList() {
            const container = document.getElementById('customTaskList');
            const keys = Object.keys(taskTitles).sort((a,b) => Number(a) - Number(b));

            container.innerHTML = '';

            const counts = {};

            if (window._savedCustomCounts) {
                for (const key of keys) counts[key] = window._savedCustomCounts[key] || 0;
            } else {
                for (const key of keys) counts[key] = 0;
            }

            const oldBtn = document.getElementById('generateCustomBtn');
            const newBtn = oldBtn.cloneNode(true);

            oldBtn.parentNode.replaceChild(newBtn, oldBtn);

            const shuffleCheckbox = document.getElementById('shuffleCheckbox');
            shuffleCheckbox.checked = window._savedCustomShuffle === undefined ? false : window._savedCustomShuffle;

            function updateButtonText() {
                let total = 0;

                for (const k of keys) total += counts[k];

                if (total === 0) {
                    newBtn.innerText = 'Сгенерировать тест';
                } else {
                    const wordForm = (total % 10 === 1 && total % 100 !== 11)
                        ? 'задача'
                        : ((total % 10 >= 2 && total % 10 <= 4 && (total % 100 < 10 || total % 100 >= 20)) ? 'задачи' : 'задач');

                    newBtn.innerText = `Сгенерировать тест\nиз ${total} ${wordForm}`;
                }
            }

            function getTotal() {
                let total = 0;

                for (const k of keys) total += counts[k];

                return total;
            }

            function setCount(key, newVal, source = 'user') {
                let oldVal = counts[key];

                if (oldVal === newVal) return false;

                let total = getTotal();
                let delta = newVal - oldVal;

                if (total + delta > 50) {
                    let allowed = oldVal + (50 - total);

                    if (allowed < 0) allowed = 0;

                    if (allowed === oldVal) {
                        if (source === 'user') showModalToast('Суммарное количество задач не может превышать 50');
                        return false;
                    }

                    newVal = allowed;

                    if (source === 'user') {
                        showModalToast('Суммарное количество задач не может превышать 50. Значение скорректировано.');
                    }
                }

                if (newVal < 0) newVal = 0;
                if (newVal > 50) newVal = 50;
                if (newVal === oldVal) return false;

                counts[key] = newVal;

                const inputEl = document.getElementById(`input_${key}`);
                if (inputEl && inputEl.value != newVal) inputEl.value = newVal;

                updateButtonText();

                if (getTotal() > 30 && !warnedAbout30 && source === 'user') {
                    showModalToast('⚠️ При генерации больше 30 задач, возможны задержки');
                    warnedAbout30 = true;
                }

                window._customCounts = { ...counts };
                window._savedCustomCounts = window._customCounts;
                window._savedCustomShuffle = shuffleCheckbox.checked;

                saveCurrentSettings();

                return true;
            }

            for (const key of keys) {
                const row = document.createElement('div');
                row.className = 'task-row';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'task-name';
                nameSpan.textContent = taskTitles[key];

                const counterDiv = document.createElement('div');
                counterDiv.className = 'task-counter';

                const minusBtn = document.createElement('button');
                minusBtn.textContent = '−';
                minusBtn.className = 'counter-btn';

                const numInput = document.createElement('input');
                numInput.type = 'text';
                numInput.id = `input_${key}`;
                numInput.value = counts[key] === 0 ? '0' : counts[key].toString();
                numInput.className = 'counter-input';

                const plusBtn = document.createElement('button');
                plusBtn.textContent = '+';
                plusBtn.className = 'counter-btn';

                numInput.addEventListener('input', (e) => {
                    let raw = e.target.value.replace(/[^0-9]/g, '').replace(/^0+/, '');
                    let val = raw === '' ? 0 : parseInt(raw, 10);

                    if (isNaN(val)) val = 0;

                    if (val > 50) {
                        showModalToast('Набрано максимально доступное число задач — 50');
                        val = 50;
                    }

                    numInput.value = val === 0 ? '0' : val.toString();

                    setCount(key, val, 'user');
                });

                numInput.addEventListener('paste', (e) => {
                    e.preventDefault();

                    let pasted = (e.clipboardData || window.clipboardData)
                        .getData('text')
                        .replace(/[^0-9]/g, '')
                        .replace(/^0+/, '');

                    let val = pasted === '' ? 0 : parseInt(pasted, 10);

                    if (isNaN(val)) val = 0;

                    if (val > 50) {
                        showModalToast('Набрано максимально доступное число задач — 50');
                        val = 50;
                    }

                    numInput.value = val === 0 ? '0' : val.toString();

                    setCount(key, val, 'user');
                });

                function changeBy(delta) {
                    let newVal = counts[key] + delta;

                    if (newVal < 0) newVal = 0;

                    if (newVal > 50) {
                        if (delta > 0) showModalToast('Набрано максимально доступное число задач — 50');
                        newVal = 50;
                    }

                    setCount(key, newVal, 'user');
                }

                setupHoldCounter(minusBtn, -1, numInput, changeBy);
                setupHoldCounter(plusBtn, +1, numInput, changeBy);

                counterDiv.appendChild(minusBtn);
                counterDiv.appendChild(numInput);
                counterDiv.appendChild(plusBtn);

                row.appendChild(nameSpan);
                row.appendChild(counterDiv);

                container.appendChild(row);
            }

            const clearAllBtn = document.getElementById('clearAllBtn');

            if (clearAllBtn) {
                clearAllBtn.onclick = () => {
                    for (const key of keys) setCount(key, 0, 'user');

                    warnedAbout30 = false;

                    showModalToast('Все счётчики сброшены');
                };
            }

            shuffleCheckbox.addEventListener('change', () => {
                window._savedCustomShuffle = shuffleCheckbox.checked;
                saveCurrentSettings();
            });

            warnedAbout30 = false;

            updateButtonText();

            newBtn.addEventListener('click', () => {
                const selected = {};

        async function loadGameTitlesIsolated(gameId) {
            try {
                const configRes = await fetch(`games/${gameId}/config.json`);

                if (!configRes.ok) throw new Error(`config.json для ${gameId} не найден`);

                const config = await configRes.json();
                const taskFiles = config.taskFiles || [];

                if (taskFiles.length === 0) {
                    console.warn(`Для игры ${gameId} нет taskFiles`);
                    return null;
                }

                const titles = {};

                for (const file of taskFiles) {
                    const url = `games/${gameId}/${file}`;
                    const jsText = await fetch(url).then(r => r.text());
                    const sandbox = {};
                    const func = new Function('window', jsText + '; return window.taskTitles;');
                    const taskTitles = func(sandbox);

                    if (taskTitles && typeof taskTitles === 'object') {
                        Object.assign(titles, taskTitles);
                    }
                }

                if (Object.keys(titles).length === 0) {
                    console.warn(`Для игры ${gameId} не найдено ни одного taskTitles в загруженных файлах`);
                    return null;
                }

                console.log(`Загружены названия для ${gameId}:`, titles);

                return titles;
            } catch(e) {
                console.error(`Ошибка загрузки для ${gameId}:`, e);
                return null;
            }
        }

                for (const row of rows) {
                    const taskType = row.dataset.type;
                    const minusBtn = row.querySelector('.counter-btn-mixed[data-delta="-1"]');
                    const plusBtn = row.querySelector('.counter-btn-mixed[data-delta="+1"]');
                    const input = row.querySelector('.counter-input-mixed');

                    if (minusBtn) {
                        minusBtn.addEventListener('click', (e) => {
                            e.preventDefault();

                            let current = mixedCounts[game.id]?.[taskType] || 0;

                            setMixedCount(game.id, taskType, current - 1);
                        });
                    }

                    if (plusBtn) {
                        plusBtn.addEventListener('click', (e) => {
                            e.preventDefault();

                            let current = mixedCounts[game.id]?.[taskType] || 0;

                            setMixedCount(game.id, taskType, current + 1);
                        });
                    }

                    if (input) {
                        input.addEventListener('input', (e) => {
                            let raw = e.target.value.replace(/[^0-9]/g, '').replace(/^0+/, '');
                            let val = raw === '' ? 0 : parseInt(raw, 10);

                            if (isNaN(val)) val = 0;
                            if (val > 50) val = 50;

                            setMixedCount(game.id, taskType, val);
                        });

                        input.addEventListener('paste', (e) => {
                            e.preventDefault();

                            let pasted = (e.clipboardData || window.clipboardData)
                                .getData('text')
                                .replace(/[^0-9]/g, '')
                                .replace(/^0+/, '');

                            let val = pasted === '' ? 0 : parseInt(pasted, 10);

                            if (isNaN(val)) val = 0;
                            if (val > 50) val = 50;

                            setMixedCount(game.id, taskType, val);
                        });
                    }
                }

                const chk = document.getElementById(`chk_${game.id}`);

                if (chk) {
                    chk.addEventListener('change', (e) => {
                        const isChecked = e.target.checked;
                        const tDiv = document.getElementById(`tasks_${game.id}`);

                        if (tDiv) tDiv.style.display = isChecked ? 'block' : 'none';

                        if (!isChecked) {
                            if (mixedCounts[game.id]) delete mixedCounts[game.id];

                            saveMixedSettings();
                            updateSelectedGamesInfo();
                            updateMixedButtonText();

                            if (tDiv) {
                                const inputs = tDiv.querySelectorAll('.counter-input-mixed');
                                inputs.forEach(inp => inp.value = '0');
                            }
                        } else {
                            if (!mixedCounts[game.id]) {
                                mixedCounts[game.id] = {};
                                saveMixedSettings();
                                updateSelectedGamesInfo();
                            }
                        }
                    });
                }
            }

            document.getElementById('mixedClearAllBtn').addEventListener('click', () => {
                mixedCounts = {};

                saveMixedSettings();

                for (const game of availableGames) {
                    const chk = document.getElementById(`chk_${game.id}`);

                    if (chk) chk.checked = false;

                    const tDiv = document.getElementById(`tasks_${game.id}`);

                    if (tDiv) {
                        tDiv.style.display = 'none';

                        const inputs = tDiv.querySelectorAll('.counter-input-mixed');
                        inputs.forEach(inp => inp.value = '0');
                    }
                }

                updateSelectedGamesInfo();
                updateMixedButtonText();

                showMixedToast('Все счётчики сброшены');
            });

            document.getElementById('mixedShuffleCheckbox').addEventListener('change', (e) => {
                mixedShuffle = e.target.checked;
                saveMixedSettings();
            });

            document.getElementById('mixedGenerateBtn').addEventListener('click', () => {
                const selectedGamesData = [];
                let totalTasks = 0;

                for (const game of availableGames) {
                    if (!mixedCounts[game.id]) continue;

                    const gameTasks = {};

                    for (const [type, count] of Object.entries(mixedCounts[game.id])) {
                        if (count > 0) {
                            gameTasks[type] = count;
                            totalTasks += count;
                        }
                    }

                    if (Object.keys(gameTasks).length > 0) {
                        selectedGamesData.push({
                            id: game.id,
                            name: game.name,
                            tasks: gameTasks
                        });
                    }
                }

                if (selectedGamesData.length === 0) {
                    showMixedToast('Выберите хотя бы одну задачу');
                    return;
                }

                if (totalTasks > 100) {
                    showMixedToast('Суммарное количество задач не должно превышать 100');
                    return;
                }

                const params = new URLSearchParams();

                params.set('mode', 'mixed');
                params.set('shuffle', mixedShuffle ? '1' : '0');
                params.set('games', JSON.stringify(selectedGamesData));

                goTo(`test.html?${params.toString()}`);
            });

            updateSelectedGamesInfo();
            updateMixedButtonText();
        }

        (async () => {
            await loadAllMixedGamesData();
            renderMixedSetup();
        })();
    }
</script>
</body>
</html>
